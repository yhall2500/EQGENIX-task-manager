// ---------- per-project board ----------
const PROJ_COLUMNS = [
  { status: 'open',             title: 'Open',        hint: 'Up for grabs' },
  { status: 'in_progress',      title: 'In progress', hint: 'Being worked on' },
  { status: 'pending_approval', title: 'Needs review',hint: 'Awaiting a manager' },
  { status: 'completed',        title: 'Completed',   hint: 'Done & logged' },
];

function ProjectDetailView({ store, project }) {
  const s = projectStats(project, store.tasks);
  const isManager = store.me.role === 'manager';
  const color = project.color || PROJECT_COLORS[0];
  const due = project.due ? dueLabel(project.due) : null;
  const phases = project.phases || [];
  const [sel, setSel] = useState('all'); // 'all' | phaseId | 'none'
  const cur = phases.length ? currentPhase(project, store.tasks) : null;

  // tasks in scope for the board, honouring the selected phase
  const scoped = sel === 'all' ? s.tasks
    : sel === 'none' ? s.tasks.filter(t => !t.phaseId || !phases.some(p => p.id === t.phaseId))
    : s.tasks.filter(t => t.phaseId === sel);
  const byStatus = (st) => scoped.filter(t => t.status === st).slice().sort((a, b) => taskComparator('due')(a, b));
  const unphased = s.tasks.filter(t => !t.phaseId || !phases.some(p => p.id === t.phaseId));
  const newTaskPhase = (sel !== 'all' && sel !== 'none') ? sel : (cur ? cur.phase.id : (phases[0] && phases[0].id));

  return (
    <div className="tf-proj-detail" style={{ '--proj': color }}>
      <div className="tf-proj-detail-head">
        <button className="tf-icon-btn" title="All projects" onClick={store.closeProject}><Icon name="arrowLeft" size={18} /></button>
        <span className="tf-proj-dot lg"></span>
        <div className="tf-proj-detail-id">
          <h1>{project.name}</h1>
          <p>{project.description || 'No description'}</p>
        </div>
        <div className="tf-proj-detail-acts">
          {due && <span className={'tf-proj-due chip ' + due.state}><Icon name="calendar" size={14} stroke={2} />{due.full || new Date(project.due).toLocaleDateString('en-US', { month: 'short', day: 'numeric' })}</span>}
          {isManager && <button className="tf-icon-btn" title="Edit project" onClick={() => store.openProjectModal(project.id)}><Icon name="edit" size={17} /></button>}
          {isManager && <button className="tf-icon-btn danger" title="Delete project" onClick={() => store.openProjectModal(project.id, true)}><Icon name="trash" size={17} /></button>}
          <Button variant="primary" size="sm" icon="plus" onClick={() => store.openCreate(project.id, newTaskPhase)}>New task</Button>
        </div>
      </div>

      <div className="tf-proj-detail-meta">
        <div className="tf-proj-detail-progress">
          <div className="tf-proj-progress-top"><span>{s.done.length} of {s.total} done</span><b>{s.pct}%</b></div>
          <div className="tf-proj-track"><div className="tf-proj-fill" style={{ width: s.pct + '%' }}></div></div>
        </div>
        <div className="tf-proj-detail-people">
          {s.people.length ? <AvatarStack ids={s.people} size={28} /> : <span className="tf-proj-noone"><Icon name="users" size={15} stroke={2} />No one on it yet</span>}
        </div>
      </div>

      {/* ---- phases ---- */}
      {phases.length > 0 ? (
        <div className="tf-phasebar">
          <div className="tf-phasebar-scroll">
            <button className={'tf-phase-all' + (sel === 'all' ? ' on' : '')} onClick={() => setSel('all')}>
              All phases<span className="tf-phase-all-n">{s.total}</span>
            </button>
            <div className="tf-phase-steps">
              {phases.map((ph, i) => {
                const st = phaseStat(store.tasks, project.id, ph.id);
                const complete = st.total > 0 && st.done === st.total;
                const isCur = cur && cur.phase.id === ph.id;
                return (
                  <React.Fragment key={ph.id}>
                    {i > 0 && <span className={'tf-phase-conn' + (phaseStat(store.tasks, project.id, phases[i - 1].id).total > 0 && phaseStat(store.tasks, project.id, phases[i - 1].id).done === phaseStat(store.tasks, project.id, phases[i - 1].id).total ? ' done' : '')}></span>}
                    <button className={'tf-phase-tab' + (sel === ph.id ? ' on' : '') + (complete ? ' complete' : '') + (isCur ? ' current' : '')}
                      onClick={() => setSel(sel === ph.id ? 'all' : ph.id)} title={ph.hint || ph.name}>
                      <span className="tf-phase-num">{complete ? <Icon name="check" size={13} stroke={3} /> : i + 1}</span>
                      <span className="tf-phase-tab-main">
                        <span className="tf-phase-tab-name">{ph.name}{isCur && <em className="tf-phase-cur">Current</em>}</span>
                        <span className="tf-phase-tab-meta">{st.total ? `${st.done}/${st.total} done` : 'No tasks'}</span>
                      </span>
                    </button>
                  </React.Fragment>
                );
              })}
              {unphased.length > 0 && (
                <>
                  <span className="tf-phase-conn"></span>
                  <button className={'tf-phase-tab unphased' + (sel === 'none' ? ' on' : '')} onClick={() => setSel(sel === 'none' ? 'all' : 'none')}>
                    <span className="tf-phase-num"><Icon name="inbox" size={13} stroke={2} /></span>
                    <span className="tf-phase-tab-main">
                      <span className="tf-phase-tab-name">Unassigned</span>
                      <span className="tf-phase-tab-meta">{unphased.length} task{unphased.length > 1 ? 's' : ''}</span>
                    </span>
                  </button>
                </>
              )}
            </div>
          </div>
          {isManager && <button className="tf-btn ghost sm tf-phase-edit" onClick={() => store.openPhases(project.id)}><Icon name="edit" size={14} stroke={2} />Edit phases</button>}
        </div>
      ) : isManager ? (
        <div className="tf-phase-setup">
          <div className="tf-phase-setup-txt"><Icon name="flag" size={15} stroke={2} /><span>Break this project into <b>phases</b> — Planning, Creation, Review, Launch, Follow-Up — so it reads like a plan, not a pile of tasks.</span></div>
          <Button variant="primary" size="sm" icon="plus" onClick={() => store.editProject(project.id, { phases: defaultPhases() })}>Add phases</Button>
        </div>
      ) : null}

      {s.total === 0 ? (
        <div className="tf-proj-empty inset">
          <div className="tf-empty-ic"><Icon name="inbox" size={28} stroke={1.8} /></div>
          <h2>No tasks in this project</h2>
          <p>Add the first task and it’ll show up on the team board too.</p>
          <Button variant="primary" size="md" icon="plus" onClick={() => store.openCreate(project.id, newTaskPhase)}>Add a task</Button>
        </div>
      ) : (
        <div className="tf-board tf-proj-board">
          {PROJ_COLUMNS.map(col => {
            const items = byStatus(col.status);
            return (
              <section key={col.status} className={'tf-col ' + col.status}>
                <header className="tf-col-head">
                  <div>
                    <h2>{col.title}<span className="tf-col-count">{items.length}</span></h2>
                    <p>{col.hint}</p>
                  </div>
                  {col.status === 'open' && (
                    <button className="tf-col-add" title="New task" onClick={() => store.openCreate(project.id, newTaskPhase)}><Icon name="plus" size={16} stroke={2.4} /></button>
                  )}
                </header>
                <div className="tf-col-body">
                  {items.length === 0 ? <div className="tf-col-empty">Nothing here</div>
                    : items.map(t => <TaskCard key={t.id} task={t} store={store} />)}
                </div>
              </section>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ---------- manage phases modal (managers) ----------
function PhasesModal({ store, projectId }) {
  const project = store.projects.find(p => p.id === projectId);
  const [phases, setPhases] = useState(() => (project && project.phases ? project.phases.map(p => ({ ...p })) : defaultPhases()));
  const rename = (i, v) => setPhases(ph => ph.map((p, j) => j === i ? { ...p, name: v } : p));
  const remove = (i) => setPhases(ph => ph.filter((_, j) => j !== i));
  const move = (i, dir) => setPhases(ph => {
    const a = ph.slice(); const j = i + dir;
    if (j < 0 || j >= a.length) return a;
    [a[i], a[j]] = [a[j], a[i]]; return a;
  });
  const add = () => setPhases(ph => [...ph, { id: genPhaseId(), name: '', hint: '' }]);
  const count = (id) => store.tasks.filter(t => t.projectId === projectId && t.phaseId === id).length;
  const valid = phases.length > 0 && phases.every(p => p.name.trim().length > 0);
  const orphaned = store.tasks.filter(t => t.projectId === projectId && t.phaseId && !phases.some(p => p.id === t.phaseId)).length;

  const save = () => {
    if (!valid) return;
    store.editProject(projectId, { phases: phases.map(p => ({ ...p, name: p.name.trim() })) });
    store.closePhases();
  };

  if (!project) return null;

  return (
    <Modal onClose={store.closePhases}>
      <div className="tf-modal-head">
        <div>
          <div className="tf-modal-kicker">{project.name}</div>
          <h2>Project phases</h2>
        </div>
        <button className="tf-icon-btn" onClick={store.closePhases}><Icon name="x" size={18} /></button>
      </div>

      <div className="tf-phase-edit-body">
        <p className="tf-phase-edit-note">Phases are the stages this project moves through. Rename, reorder, add or remove them — every task can live in one phase.</p>
        <div className="tf-phase-edit-list">
          {phases.map((p, i) => {
            const n = count(p.id);
            return (
              <div key={p.id} className="tf-phase-edit-row">
                <span className="tf-phase-edit-num">{i + 1}</span>
                <div className="tf-phase-edit-reorder">
                  <button className="tf-phase-edit-move" disabled={i === 0} title="Move up" onClick={() => move(i, -1)}><Icon name="chevronDown" size={14} stroke={2.4} style={{ transform: 'rotate(180deg)' }} /></button>
                  <button className="tf-phase-edit-move" disabled={i === phases.length - 1} title="Move down" onClick={() => move(i, 1)}><Icon name="chevronDown" size={14} stroke={2.4} /></button>
                </div>
                <input className="tf-phase-edit-input" value={p.name} placeholder="Phase name"
                  onChange={e => rename(i, e.target.value)} />
                {n > 0 && <span className="tf-phase-edit-count" title={n + ' task' + (n > 1 ? 's' : '') + ' in this phase'}>{n}</span>}
                <button className="tf-phase-edit-del" title="Remove phase" onClick={() => remove(i)}><Icon name="trash" size={15} /></button>
              </div>
            );
          })}
        </div>
        <button className="tf-phase-edit-add" onClick={add}><Icon name="plus" size={15} stroke={2.4} />Add a phase</button>
        {orphaned > 0 && (
          <div className="tf-phase-edit-warn"><Icon name="inbox" size={14} stroke={2} />{orphaned} task{orphaned > 1 ? 's' : ''} in removed phases will move to <b>Unassigned</b> — nothing is deleted.</div>
        )}
      </div>

      <div className="tf-modal-foot">
        <button className="tf-btn ghost sm" onClick={() => setPhases(defaultPhases())}><Icon name="undo" size={14} stroke={2} />Reset to default 5</button>
        <div className="tf-foot-acts">
          <Button variant="ghost" onClick={store.closePhases}>Cancel</Button>
          <Button variant="primary" icon="check" disabled={!valid} onClick={save}>Save phases</Button>
        </div>
      </div>
    </Modal>
  );
}

// ---------- create / edit project modal ----------
function ProjectModal({ store }) {
  const state = store.projectModal; // { id?, confirmDelete? }
  const editing = state && state.id ? store.projects.find(p => p.id === state.id) : null;
  const [f, setF] = useState(() => ({
    name: editing ? editing.name : '',
    description: editing ? (editing.description || '') : '',
    color: editing ? (editing.color || PROJECT_COLORS[0]) : PROJECT_COLORS[0],
    due: editing && editing.due ? new Date(editing.due).toISOString().slice(0, 10) : '',
  }));
  const [confirmDel, setConfirmDel] = useState(!!(state && state.confirmDelete && editing));
  const set = (k, v) => setF(s => ({ ...s, [k]: v }));
  const valid = f.name.trim().length > 1;

  const submit = () => {
    if (!valid) return;
    const payload = {
      name: f.name.trim(),
      description: f.description.trim() || null,
      color: f.color,
      due: f.due ? new Date(f.due + 'T17:00') : null,
    };
    if (editing) store.editProject(editing.id, payload);
    else store.createProject(payload);
  };

  return (
    <Modal onClose={store.closeProjectModal}>
      <div className="tf-modal-head">
        <div>
          <div className="tf-modal-kicker">{editing ? 'Edit project' : 'New project'}</div>
          <h2>{editing ? 'Update project details' : 'Create a project'}</h2>
        </div>
        <button className="tf-icon-btn" onClick={store.closeProjectModal}><Icon name="x" size={18} /></button>
      </div>

      {confirmDel ? (
        <div className="tf-complete-body">
          <div className="tf-approve-hint" style={{ background: 'var(--overdue-soft)', color: '#a23528' }}>
            <Icon name="trash" size={15} />Deleting <b>{editing.name}</b> won’t delete its tasks — they’ll just move back to “No project”.
          </div>
        </div>
      ) : (
        <div className="tf-form">
          <label className="tf-field full">
            <span>Project name</span>
            <input autoFocus value={f.name} onChange={e => set('name', e.target.value)} placeholder="e.g. G2G, Sacred Deposits" />
          </label>
          <label className="tf-field full">
            <span>Description <em className="tf-field-opt">— optional</em></span>
            <textarea rows="2" value={f.description} onChange={e => set('description', e.target.value)} placeholder="What this project is about…" />
          </label>
          <label className="tf-field full">
            <span>Color</span>
            <div className="tf-proj-swatches">
              {PROJECT_COLORS.map(c => (
                <button key={c} type="button" className={'tf-proj-swatch' + (f.color === c ? ' on' : '')}
                  style={{ background: c }} onClick={() => set('color', c)} aria-label={c}>
                  {f.color === c && <Icon name="check" size={13} stroke={3} />}
                </button>
              ))}
            </div>
          </label>
          <label className="tf-field full">
            <span>Target date <em className="tf-field-opt">— optional</em></span>
            <input type="date" value={f.due} onChange={e => set('due', e.target.value)} />
          </label>
        </div>
      )}

      <div className="tf-modal-foot">
        {editing && !confirmDel
          ? <button className="tf-btn ghost sm" style={{ color: 'var(--overdue)' }} onClick={() => setConfirmDel(true)}><Icon name="trash" size={15} stroke={2} />Delete</button>
          : <span className="tf-foot-note">{confirmDel ? '' : 'Managers can create projects for the team.'}</span>}
        <div className="tf-foot-acts">
          {confirmDel ? (
            <>
              <Button variant="ghost" onClick={() => setConfirmDel(false)}>Cancel</Button>
              <Button variant="danger" icon="trash" onClick={() => store.deleteProject(editing.id)}>Delete project</Button>
            </>
          ) : (
            <>
              <Button variant="ghost" onClick={store.closeProjectModal}>Cancel</Button>
              <Button variant="primary" icon={editing ? 'check' : 'plus'} disabled={!valid} onClick={submit}>{editing ? 'Save changes' : 'Create project'}</Button>
            </>
          )}
        </div>
      </div>
    </Modal>
  );
}

Object.assign(window, { ProjectsView, ProjectDetailView, ProjectModal, PhasesModal, projectStats, phaseStat, currentPhase, PROJECT_COLORS });

</script>
<script type="text/babel">
/* ============================================================
   TaskFlow — Team (members) view + Team Chat view
   Talk to window.Backend; resolve names via TASKFLOW_DATA.USERS.
   ============================================================ */

/* ---------------- Team members ---------------- */
function TeamView({ store }) {
  const me = store.me;
  const isManager = me.role === 'manager';
  const members = store.members.slice().sort((a, b) => {
    if ((a.role === 'manager') !== (b.role === 'manager')) return a.role === 'manager' ? -1 : 1;
    return a.name.localeCompare(b.name);
  });
  const tasks = store.tasks;
  const managers = members.filter(m => m.role === 'manager').length;

  return (
    <div className="tf-team">
      <div className="tf-mgr-stats">
        <Stat n={members.length} label="Team members" tone="open" />
        <Stat n={managers} label="Managers" tone="review" />
        <Stat n={members.length - managers} label="Members" tone="progress" />
      </div>

      <div className="tf-team-grid">
        {members.map(u => {
          const active = tasks.filter(t => t.claimedBy === u.id && t.status === 'in_progress').length;
          const done = tasks.filter(t => t.completedBy === u.id && t.status === 'completed').length;
          const isMe = u.id === me.id;
          return (
            <div key={u.id} className="tf-member-card clickable" onClick={() => store.openMember(u.id)}
              title={`See what ${u.name.split(' ')[0]} is working on`}>
              <div className="tf-member-open"><span className="tf-member-open-label">View</span><Icon name="chevron" size={16} /></div>
              <div className="tf-member-top">
                <Avatar user={u} size={48} />
                <div className="tf-member-id">
                  <div className="tf-member-name">{u.name}{isMe && <span className="tf-you-tag">You</span>}</div>
                  <div className="tf-member-title">{u.title}</div>
                </div>
                {u.role === 'manager'
                  ? <span className="tf-role-badge"><Icon name="shield" size={13} stroke={2} />Manager</span>
                  : <span className="tf-role-badge member">Member</span>}
              </div>
              <div className="tf-member-email"><Icon name="mail" size={14} stroke={2} />{u.email || emailFor(u)}</div>
              <div className="tf-member-stats">
                <div><b>{active}</b><span>In progress</span></div>
                <div><b>{done}</b><span>Completed</span></div>
              </div>
              {isManager && !isMe && (
                <div className="tf-member-acts" onClick={e => e.stopPropagation()}>
                  {u.role === 'manager'
                    ? <Button size="sm" variant="ghost" icon="user" onClick={() => store.setRole(u.id, 'member')}>Make member</Button>
                    : <Button size="sm" variant="default" icon="shield" onClick={() => store.setRole(u.id, 'manager')}>Make manager</Button>}
                </div>
              )}
            </div>
          );
        })}
      </div>

      {isManager && (
        <div className="tf-team-invite-cta">
          <div>
            <b>Bring more of the team in</b>
            <span>Invite teammates by email — they set their own password and join EQGenix.</span>
          </div>
          <Button variant="primary" icon="users" onClick={store.openInvite}>Invite teammate</Button>
        </div>
      )}
    </div>
  );
}

/* ---------------- Team chat ---------------- */
function ChatView({ store }) {
  const me = store.me;
  const [messages, setMessages] = useState(null); // null = loading
  const [text, setText] = useState('');
  const [sending, setSending] = useState(false);
  const scrollRef = useRef();
  const bottomRef = useRef(true); // is user pinned to bottom?

  const load = async (initial) => {
    try {
      const msgs = await Backend.listMessages();
      setMessages(prev => {
        // only update if changed (avoid scroll jumps)
        if (prev && prev.length === msgs.length && prev.length && prev[prev.length - 1].id === msgs[msgs.length - 1].id) return prev;
        return msgs;
      });
    } catch (e) { setMessages([]); }
  };

  useEffect(() => {
    load(true);
    const iv = setInterval(load, 4000);
    return () => clearInterval(iv);
  }, []);

  // autoscroll to bottom when new messages arrive and user is near bottom
  useEffect(() => {
    const el = scrollRef.current;
    if (el && bottomRef.current) el.scrollTop = el.scrollHeight;
  }, [messages]);

  const onScroll = () => {
    const el = scrollRef.current; if (!el) return;
    bottomRef.current = el.scrollHeight - el.scrollTop - el.clientHeight < 80;
  };

  const send = async () => {
    const body = text.trim();
    if (!body || sending) return;
    setSending(true); setText('');
    bottomRef.current = true;
    const optimistic = { id: 'tmp_' + Date.now(), userId: me.id, body, at: new Date(), pending: true };
    setMessages(list => [...(list || []), optimistic]);
    try { await Backend.sendMessage(body); await load(); }
    catch (e) { store.flash(e.message || 'Message failed to send', 'clock', 'review'); }
    finally { setSending(false); }
  };

  const dayKey = (d) => d.toDateString();
  const fmtDay = (d) => {
    const today = new Date(window.TASKFLOW_DATA.NOW).toDateString();
    if (d.toDateString() === today) return 'Today';
    return d.toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' });
  };
  const fmtTime = (d) => d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });

  // group consecutive messages by same author within 5 min, and insert day dividers
  const rows = [];
  if (messages) {
    let lastDay = null, lastUser = null, lastAt = 0;
    messages.forEach(m => {
      const at = m.at instanceof Date ? m.at : new Date(m.at);
      const dk = dayKey(at);
      if (dk !== lastDay) { rows.push({ type: 'day', key: 'd' + dk, label: fmtDay(at) }); lastDay = dk; lastUser = null; }
      const grouped = m.userId === lastUser && (at.getTime() - lastAt) < 5 * 60000;
      rows.push({ type: 'msg', m, at, grouped });
      lastUser = m.userId; lastAt = at.getTime();
    });
  }

  return (
    <div className="tf-chat">
      <div className="tf-chat-head">
        <div className="tf-chat-head-ic"><Icon name="chat" size={18} stroke={2} /></div>
        <div>
          <h2>Team chat</h2>
          <p>{store.members.length} members · everyone in {store.appName} sees this channel</p>
        </div>
      </div>

      <div className="tf-chat-scroll" ref={scrollRef} onScroll={onScroll}>
        {messages === null ? (
          <div className="tf-chat-loading"><span className="tf-spinner dark"></span></div>
        ) : messages.length === 0 ? (
          <div className="tf-chat-empty">
            <div className="tf-chat-empty-ic"><Icon name="chat" size={28} stroke={1.7} /></div>
            <b>No messages yet</b>
            <span>Say hello — this channel is shared with the whole team.</span>
          </div>
        ) : rows.map(r => r.type === 'day' ? (
          <div key={r.key} className="tf-chat-day"><span>{r.label}</span></div>
        ) : (() => {
          const u = userById(r.m.userId) || { name: 'Someone', color: '#999', id: r.m.userId };
          const mine = r.m.userId === me.id;
          return (
            <div key={r.m.id} className={'tf-msg' + (mine ? ' mine' : '') + (r.grouped ? ' grouped' : '')}>
              {!mine && <div className="tf-msg-av">{!r.grouped && <Avatar user={u} size={32} />}</div>}
              <div className="tf-msg-main">
                {!r.grouped && <div className="tf-msg-meta">{!mine && <b>{u.name.split(' ')[0]}</b>}<span>{fmtTime(r.at)}</span></div>}
                <div className={'tf-msg-bubble' + (r.m.pending ? ' pending' : '')}>{r.m.body}</div>
              </div>
            </div>
          );
        })())}
      </div>

      <div className="tf-chat-compose">
        <input value={text} onChange={e => setText(e.target.value)} placeholder={`Message ${store.appName}…`}
          onKeyDown={e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } }} />
        <button className="tf-chat-send" disabled={!text.trim() || sending} onClick={send}>
          <Icon name="send" size={18} stroke={2} />
        </button>
      </div>
    </div>
  );
}

/* ---------------- Member profile (viewable by teammates) ---------------- */
function MemberModal({ store, uid, onClose }) {

  const assigned = tasks.filter(t => t.assignedTo === uid && t.status === 'open');
  const completed = tasks.filter(t => t.completedBy === uid && t.status === 'completed');

  const Row = ({ t, tag }) => (

}

/* ---------------- Personal tasks (private to-do list) ---------------- */
function PersonalTasks({ store }) {
  const [items, setItems] = useState(null); // null = loading
  const [title, setTitle] = useState('');
  const [due, setDue] = useState('');
  const [adding, setAdding] = useState(false);

  const load = async () => { try { setItems(await Backend.listPersonal()); } catch (e) { setItems([]); } };
  useEffect(() => { load(); }, []);

  const add = async () => {
    const t = title.trim();
    if (!t || adding) return;
    setAdding(true); setTitle(''); const d = due; setDue('');
    const optimistic = { id: 'tmp_' + Date.now(), title: t, done: false, due: d ? new Date(d) : null, pending: true };
    setItems(list => [...(list || []), optimistic]);
    try { await Backend.addPersonal({ title: t, due: d || null }); await load(); }
    catch (e) { store.flash(e.message || 'Could not add', 'clock', 'review'); }
    finally { setAdding(false); }
  };
  const toggle = async (it) => {
    setItems(list => list.map(x => x.id === it.id ? { ...x, done: !x.done } : x));
    try { await Backend.setPersonalDone(it.id, !it.done); } catch (e) { load(); }
  };
  const remove = async (it) => {
    setItems(list => list.filter(x => x.id !== it.id));
    try { await Backend.deletePersonal(it.id); } catch (e) { load(); }
  };

  const open = (items || []).filter(x => !x.done);
  const done = (items || []).filter(x => x.done);

  return (
    <div className="tf-personal">
      <div className="tf-personal-head">
        <div className="tf-personal-title">
          <Icon name="user" size={16} stroke={2} />
          <h2>Personal to-dos</h2>
          <span className="tf-private-tag"><Icon name="shield" size={12} stroke={2} />Private to you</span>
        </div>
        <p>Your own reminders — never posted to the team board or seen by anyone else.</p>
      </div>

      <div className="tf-personal-add">
        <input value={title} onChange={e => setTitle(e.target.value)} placeholder="Add a private to-do…"
          onKeyDown={e => e.key === 'Enter' && add()} />
        <input type="date" className="tf-personal-date" value={due} onChange={e => setDue(e.target.value)} title="Optional due date" />
        <button className="tf-btn primary sm" disabled={!title.trim() || adding} onClick={add}><Icon name="plus" size={15} stroke={2.2} />Add</button>
      </div>

      <div className="tf-personal-list">
        {items === null ? (
          <div className="tf-personal-loading"><span className="tf-spinner dark"></span></div>
        ) : items.length === 0 ? (
          <p className="tf-personal-empty">Nothing here yet. Add a private reminder above.</p>
        ) : (
          <>
            {open.map(it => <PersonalRow key={it.id} it={it} toggle={toggle} remove={remove} />)}
            {done.length > 0 && <div className="tf-personal-divider">Done ({done.length})</div>}
            {done.map(it => <PersonalRow key={it.id} it={it} toggle={toggle} remove={remove} />)}
          </>
        )}
      </div>
    </div>
  );
}

function PersonalRow({ it, toggle, remove }) {
  const due = it.due ? dueLabel(it.due) : null;
  return (
    <div className={'tf-personal-row' + (it.done ? ' done' : '') + (it.pending ? ' pending' : '')}>
      <button className={'tf-checkbox round' + (it.done ? ' on' : '')} onClick={() => toggle(it)}>
        {it.done && <Icon name="check" size={12} stroke={3} />}
      </button>
      <span className="tf-personal-text">{it.title}</span>
      {due && !it.done && <span className={'tf-personal-due ' + due.state}><Icon name="clock" size={12} stroke={2} />{due.text}</span>}
      <button className="tf-personal-del" title="Delete" onClick={() => remove(it)}><Icon name="trash" size={15} /></button>
    </div>
  );
}

              <option value="weekly">Every week</option>
              <option value="monthly">Every month</option>
            </select>
            <Icon name="chevronDown" size={15} />
          </div>
        </label>

        <label className="tf-check full" onClick={() => set('requiresApproval', !f.requiresApproval)}>
          <span className={'tf-checkbox' + (f.requiresApproval ? ' on' : '')}>{f.requiresApproval && <Icon name="check" size={13} stroke={3} />}</span>
          <span className="tf-check-text"><b>Require manager approval</b> before it counts as done</span>
        </label>
      </div>

      <div className="tf-modal-foot">
        <span className="tf-foot-note">Changes are shared with the whole team.</span>
        <div className="tf-foot-acts">
          <Button variant="ghost" onClick={store.closeModals}>Cancel</Button>
          <Button variant="primary" icon="check" disabled={!valid} onClick={submit}>Save changes</Button>
        </div>
      </div>
    </Modal>
  );
}

// ---------- complete task ----------
function CompleteModal({ store }) {
  const task = store.tasks.find(t => t.id === store.completeId);
  const [note, setNote] = useState('');
  const [checked, setChecked] = useState(false);
  const [proofUrl, setProofUrl] = useState(null);
  const [fileName, setFileName] = useState('');
  const [uploading, setUploading] = useState(false);
  const fileRef = useRef();
  if (!task) return null;
  const needsProof = task.proof;
  const proofReady = needsProof === 'note' ? note.trim().length > 0
    : needsProof === 'checklist' ? checked
    : !!proofUrl; // photo/file need a real upload

  const pick = () => fileRef.current && fileRef.current.click();
  const onFile = async (e) => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    setUploading(true); setFileName(file.name);
    try { const url = await Backend.uploadProof(file); setProofUrl(url); }
    catch (err) { store.flash(err.message || 'Upload failed', 'clock', 'review'); setFileName(''); }
    finally { setUploading(false); }
  };
  const clearFile = () => { setProofUrl(null); setFileName(''); if (fileRef.current) fileRef.current.value = ''; };

  const proofCopy = {
    note: 'Add a short completion note',
    photo: 'Attach a photo as proof',
    file: 'Attach the finished file',
    checklist: 'Confirm every step is done',
  };

  return (
    <Modal onClose={store.closeModals}>
      <div className="tf-modal-head">
        <div>
          <div className="tf-modal-kicker">Mark complete</div>
          <h2>{task.title}</h2>
        </div>
        <button className="tf-icon-btn" onClick={store.closeModals}><Icon name="x" size={18} /></button>
      </div>

      <div className="tf-complete-body">
        <div className="tf-complete-proof">
          <div className="tf-proof-head"><ProofTag proof={task.proof} /><span>{proofCopy[task.proof]}</span></div>

          {task.proof === 'note' && (
            <textarea autoFocus rows="3" value={note} onChange={e => setNote(e.target.value)}
              placeholder="What did you do? Anything the next person should know?" />
          )}
          {(task.proof === 'photo' || task.proof === 'file') && (
            <>
              <input ref={fileRef} type="file" accept={task.proof === 'photo' ? 'image/*' : undefined}
                onChange={onFile} style={{ display: 'none' }} />
              {!proofUrl ? (
                <button type="button" className={'tf-drop' + (uploading ? ' busy' : '')} onClick={pick} disabled={uploading}>
                  {uploading
                    ? <><span className="tf-spinner dark"></span><span>Uploading {fileName}…</span></>
                    : <><Icon name={task.proof === 'photo' ? 'camera' : 'paperclip'} size={22} /><span>Click to attach {task.proof === 'photo' ? 'a photo' : 'a file'}</span></>}
                </button>
              ) : task.proof === 'photo' ? (
                <div className="tf-proof-preview">
                  <img src={proofUrl} alt="proof" />
                  <button type="button" className="tf-proof-clear" onClick={clearFile}><Icon name="x" size={14} />Remove</button>
                </div>
              ) : (
                <div className="tf-drop on">
                  <Icon name="paperclip" size={20} />
                  <span><b>{fileName}</b> attached</span>
                  <button type="button" className="tf-proof-clear inline" onClick={clearFile}><Icon name="x" size={14} /></button>
                </div>
              )}
            </>
          )}
          {task.proof === 'checklist' && (
            <button type="button" className={'tf-checkrow' + (checked ? ' on' : '')} onClick={() => setChecked(c => !c)}>
              <span className={'tf-checkbox' + (checked ? ' on' : '')}>{checked && <Icon name="check" size={13} stroke={3} />}</span>
              I confirm every step of this task is finished
            </button>
          )}
          {task.proof !== 'note' && (
            <textarea rows="2" value={note} onChange={e => setNote(e.target.value)}
              placeholder="Optional note…" style={{ marginTop: 10 }} />
          )}
        </div>

        {task.requiresApproval && (
          <div className="tf-approve-hint"><Icon name="checkCircle" size={15} />This task needs <b>{userById(task.createdBy).name.split(' ')[0]}</b>’s approval — it’ll move to <b>Needs review</b> first.</div>
        )}
      </div>

      <div className="tf-modal-foot">
        <span className="tf-foot-note">Logged as <b>you</b>, {new Date(window.TASKFLOW_DATA.NOW).toLocaleString('en-US', { hour: 'numeric', minute: '2-digit', month: 'short', day: 'numeric' })}</span>
        <div className="tf-foot-acts">
          <Button variant="ghost" onClick={store.closeModals}>Cancel</Button>
          <Button variant="primary" icon="check" disabled={!proofReady || uploading}
            onClick={() => store.complete(task.id, note.trim(), proofUrl)}>
            {task.requiresApproval ? 'Submit for review' : 'Complete task'}
          </Button>
        </div>
      </div>
    </Modal>
  );
}

// ---------- task detail slide-over ----------
function TaskDetail({ store }) {
  const task = store.tasks.find(t => t.id === store.detailId);
  const [comment, setComment] = useState('');
  const [confirmDel, setConfirmDel] = useState(false);
  if (!task) return null;
  const me = store.me;
  const completed = task.status === 'completed';
  const rawDue = dueLabel(task.due);
  const due = completed ? { ...rawDue, state: 'done' } : rawDue;
  const action = taskAction(task, me);
  const creator = userById(task.createdBy);
  const isCreator = task.createdBy === me.id;
  const canEdit = me.role === 'manager' || isCreator;
  const canDelete = me.role === 'manager' || isCreator;
  const assignee = task.assignedTo ? userById(task.assignedTo) : null;
  const project = task.projectId ? (store.projects || []).find(p => p.id === task.projectId) : null;
  const phase = project && project.phases && task.phaseId ? project.phases.find(p => p.id === task.phaseId) : null;

  const primary = () => {
    if (action.key === 'claim') store.claim(task.id);
    else if (action.key === 'complete') { store.closeDetail(); store.openComplete(task.id); }
    else if (action.key === 'review') {/* handled by approve/reject buttons below */}
  };

  return (
    <div className="tf-sheet-overlay" onClick={store.closeDetail}>
      <aside className="tf-sheet" onClick={e => e.stopPropagation()}>
        <header className="tf-sheet-head">
          <button className="tf-icon-btn" onClick={store.closeDetail}><Icon name="arrowLeft" size={18} /></button>
          <StatusBadge status={task.status} />
          <div className="tf-sheet-head-tags">
            {project && <button className="tf-proj-pill" style={{ '--proj': project.color || '#D9824F' }} onClick={() => { store.closeDetail(); store.openProject(project.id); }}><span className="tf-proj-pill-dot"></span>{project.name}</button>}
            {phase && <span className="tf-phase-tag detail"><Icon name="flag" size={11} stroke={2.4} />{phase.name}</span>}
            <PriorityTag priority={task.priority} /><DeptTag dept={task.dept} />
          </div>
          {(canEdit || canDelete) && (
            <div className="tf-sheet-head-acts">
              {canEdit && <button className="tf-icon-btn" title="Edit task" onClick={() => store.openEdit(task.id)}><Icon name="edit" size={17} /></button>}
              {canDelete && <button className="tf-icon-btn danger" title="Delete task" onClick={() => setConfirmDel(true)}><Icon name="trash" size={17} /></button>}
            </div>
          )}
        </header>

        {confirmDel && (
          <div className="tf-del-confirm">
            <div className="tf-del-confirm-text"><b>Delete this task?</b><span>This removes it for the whole team and can’t be undone.</span></div>
            <div className="tf-foot-acts">
              <Button variant="ghost" onClick={() => setConfirmDel(false)}>Cancel</Button>
              <Button variant="danger" icon="trash" onClick={() => store.deleteTask(task.id)}>Delete</Button>
            </div>
          </div>
        )}

        <div className="tf-sheet-body">
          <h1 className="tf-sheet-title">{task.title}</h1>

          <div className="tf-sheet-facts">
            <div className="tf-fact"><span>Due</span><b className={'fact-due ' + due.state}>{due.full || 'No date'}</b></div>
            <div className="tf-fact"><span>Estimate</span><b>{task.estimate}</b></div>
            <div className="tf-fact"><span>Proof</span><b><ProofTag proof={task.proof} /></b></div>
            <div className="tf-fact"><span>Assigned to</span><b>{assignee ? <span className="tf-fact-who"><Avatar user={assignee} size={20} />{assignee.id === me.id ? 'You' : assignee.name.split(' ')[0]}</span> : 'Anyone'}</b></div>
          </div>

          <section className="tf-sheet-sec">
            <h3>Instructions</h3>
            <p className="tf-sheet-desc">{task.desc}</p>
          </section>

          {(task.completionNote) && (
            <section className="tf-sheet-sec">
              <h3>Completion proof</h3>
              <div className="tf-proof-card">
                <div className="tf-proof-card-head"><ProofTag proof={task.proof} /><span>Submitted by {userById(task.completedBy)?.name.split(' ')[0]} · {relTime(task.completedAt)}</span></div>
                <p>{task.completionNote}</p>
                {task.proofUrl && task.proof === 'photo' && (
                  <a className="tf-proof-img" href={task.proofUrl} target="_blank" rel="noopener"><img src={task.proofUrl} alt="completion proof" /></a>
                )}
                {task.proofUrl && task.proof !== 'photo' && (
                  <a className="tf-proof-file" href={task.proofUrl} target="_blank" rel="noopener"><Icon name="paperclip" size={15} />View attached file</a>
                )}
                {!task.proofUrl && (task.proof === 'photo' || task.proof === 'file') && (
                  <div className="tf-proof-file muted"><Icon name={task.proof === 'photo' ? 'camera' : 'paperclip'} size={15} />No file attached</div>
                )}
              </div>
            </section>
          )}

          <section className="tf-sheet-sec">
            <h3>Activity</h3>
            <div className="tf-timeline">
              {task.activity.map((a, i) => (
                <div key={i} className="tf-tl-row">
                  <Avatar user={userById(a.by)} size={26} />
                  <div className="tf-tl-text">
                    <span><b>{userById(a.by).name.split(' ')[0]}</b> {activityVerb(a.type)} this task</span>
                    <span className="tf-tl-time">{relTime(a.at)}</span>
                  </div>
                </div>
              ))}
            </div>
          </section>

          <section className="tf-sheet-sec">
            <h3>Comments</h3>
            {task.comments.length === 0 && <p className="tf-empty-comment">No comments yet.</p>}
            <div className="tf-comments">
              {task.comments.map((c, i) => (
                <div key={i} className="tf-comment">
                  <Avatar user={userById(c.by)} size={26} />
                  <div className="tf-comment-bubble">
                    <div className="tf-comment-head"><b>{userById(c.by).name.split(' ')[0]}</b><span>{relTime(c.at)}</span></div>
                    <p>{c.text}</p>
                  </div>
                </div>
              ))}
            </div>
            <div className="tf-comment-input">
              <Avatar user={me} size={26} />
              <input value={comment} onChange={e => setComment(e.target.value)}
                placeholder="Add a comment…" onKeyDown={e => { if (e.key === 'Enter' && comment.trim()) { store.comment(task.id, comment.trim()); setComment(''); } }} />
              <button className="tf-send" disabled={!comment.trim()}
                onClick={() => { if (comment.trim()) { store.comment(task.id, comment.trim()); setComment(''); } }}><Icon name="chevron" size={16} stroke={2.4} /></button>
            </div>
          </section>
        </div>

        <footer className="tf-sheet-foot">
          {task.status === 'open' && (
            <>
              <div className="tf-sheet-foot-note">
                {assignee
                  ? <><Icon name="user" size={15} stroke={2} />Assigned to {assignee.id === me.id ? 'you' : assignee.name.split(' ')[0]} · created by {creator.name.split(' ')[0]}</>
                  : <><Icon name="users" size={15} stroke={2} />Open to the team · created by {creator.name.split(' ')[0]}</>}
              </div>
              <Button variant="primary" icon="hand" onClick={primary}>{assignee && assignee.id === me.id ? 'Start this task' : 'Claim this task'}</Button>
            </>
          )}
          {task.status === 'in_progress' && task.claimedBy === me.id && (
            <>
              <div className="tf-sheet-foot-note">You claimed this {relTime(task.claimedAt)}</div>
              <Button variant="primary" icon="check" onClick={primary}>Mark complete</Button>
            </>
          )}
          {task.status === 'in_progress' && task.claimedBy !== me.id && (
            <div className="tf-sheet-foot-note solo"><Avatar user={userById(task.claimedBy)} size={24} />{userById(task.claimedBy).name.split(' ')[0]} is on it · claimed {relTime(task.claimedAt)}</div>
          )}
          {task.status === 'pending_approval' && me.role === 'manager' && (
            <>
              <div className="tf-sheet-foot-note">Submitted by {userById(task.completedBy).name.split(' ')[0]} · review it</div>
              <div className="tf-foot-acts">
                <Button variant="ghost" icon="undo" onClick={() => store.reject(task.id)}>Send back</Button>
                <Button variant="primary" icon="check" onClick={() => store.approve(task.id)}>Approve</Button>
              </div>
            </>
          )}
          {task.status === 'pending_approval' && me.role !== 'manager' && (
            <div className="tf-sheet-foot-note solo"><Icon name="clock" size={15} />Waiting on {userById(task.createdBy).name.split(' ')[0]} to review</div>
          )}
          {task.status === 'completed' && (
            <div className="tf-sheet-foot-note done"><Icon name="checkCircle" size={16} />Completed by {userById(task.completedBy).name.split(' ')[0]} · {relTime(task.completedAt)}{task.approvedBy ? ` · approved by ${userById(task.approvedBy).name.split(' ')[0]}` : ''}</div>
          )}
        </footer>
      </aside>
    </div>
  );
}

// ---------- notifications ----------
function NotifPanel({ store, onClose }) {
  const me = store.me;
  const items = store.notifications;
  const ICONS = { claim: 'hand', review: 'checkCircle', done: 'check', approved: 'checkCircle', reopened: 'undo', comment: 'chat', assign: 'user', overdue: 'clock', new: 'plus' };
  return (
    <>
      <div className="tf-pop-scrim" onClick={onClose}></div>
      <div className="tf-notif">
        <div className="tf-notif-head"><h3>Notifications</h3><button className="tf-link" onClick={store.clearNotifs}>Mark all read</button></div>
        <div className="tf-notif-list">
          {items.length === 0 && <div className="tf-notif-empty">You’re all caught up.</div>}
          {items.map((n) => (
            <div key={n.id} className={'tf-notif-row' + (n.read ? '' : ' unread')}
              onClick={() => { if (n.taskId) store.openDetail(n.taskId); onClose(); }}>
              <div className={'tf-notif-ic ' + n.kind}><Icon name={ICONS[n.kind] || 'bell'} size={15} stroke={2} /></div>
              <div className="tf-notif-text"><p>{n.text}</p><span>{relTime(n.at)}</span></div>
              {!n.read && <span className="tf-notif-dot"></span>}
            </div>
          ))}
        </div>
      </div>
    </>
  );
}

// ---------- toast ----------
function Toast({ toast }) {
  if (!toast) return null;
  return (
    <div className="tf-toast" key={toast.id}>
      <div className={'tf-toast-ic ' + (toast.tone || 'done')}><Icon name={toast.icon || 'check'} size={16} stroke={2.4} /></div>
      <span>{toast.text}</span>
    </div>
  );
}

Object.assign(window, { Modal, CreateModal, EditModal, CompleteModal, TaskDetail, NotifPanel, Toast });

</script>
<script type="text/babel">
/* ============================================================
   TaskFlow — App: boot, auth gating, store (state + actions
   backed by window.Backend), top bar, routing, tweaks.
   ============================================================ */
const D = window.TASKFLOW_DATA;
let _nid = 1;
const nid = () => 'n_' + _nid++;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "palette": ["#D9824F", "#fbf1e9", "#8a4a26"],
  "density": "regular",
  "appName": "EQGenix",
  "claimVerb": "Claim",
  "boardTitle": "Team board"
} /*EDITMODE-END*/;

function buildNotifs(tasks, me) {
  const out = [];
  const overdue = tasks.filter((t) => t.status === 'open' && t.due && new Date(t.due) < new Date(D.NOW));
  overdue.slice(0, 2).forEach((t) => out.push({ id: nid(), kind: 'overdue', text: `“${t.title}” is overdue and still unclaimed`, at: Date.now() - 3600000, read: false, taskId: t.id }));
  if (me.role === 'manager') {
    tasks.filter((t) => t.status === 'pending_approval').slice(0, 3).forEach((t) =>
    out.push({ id: nid(), kind: 'review', text: `“${t.title}” is waiting for your review`, at: Date.now() - 1800000, read: false, taskId: t.id }));
  }
  return out;
}

function Splash() {
  return (
    <div className="tf-splash">
      <div className="tf-logo lg"><Icon name="checkCircle" size={28} stroke={2.2} /></div>
      <span className="tf-spinner dark"></span>
    </div>);

}

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

  // ---- boot / auth ----
  const [phase, setPhase] = useState('booting'); // booting | auth | invite | ready
  const inviteToken = useMemo(() => new URLSearchParams(location.search).get('invite'), []);
  const [meId, setMeId] = useState(null);
  const [members, setMembers] = useState([]);
  const [rev, setRev] = useState(0);

  // ---- app state ----
  const [tasks, setTasks] = useState([]);
  const [projects, setProjects] = useState([]);
  const [activeProjectId, setActiveProjectId] = useState(null);
  const [projectModal, setProjectModal] = useState(null); // null | { id? }
  const [phasesFor, setPhasesFor] = useState(null); // projectId whose phases are being managed
  const [createProjectId, setCreateProjectId] = useState(null);
  const [createPhaseId, setCreatePhaseId] = useState(null);
  const [view, setView] = useState('board');
  const [layout, setLayout] = useState('board');
  const [filters, setFilters] = useState({ q: '', dept: 'All', mine: false, priority: 'All', assignee: 'All', sort: 'due' });
  const [detailId, setDetailId] = useState(null);
  const [createOpen, setCreateOpen] = useState(false);
  const [editId, setEditId] = useState(null);
  const [completeId, setCompleteId] = useState(null);
  const [profileOpen, setProfileOpen] = useState(false);
  const [memberId, setMemberId] = useState(null);
  const [inviteOpen, setInviteOpen] = useState(false);
  const [notifs, setNotifs] = useState([]);
  const [notifOpen, setNotifOpen] = useState(false);
  const [userMenu, setUserMenu] = useState(false);
  const [toast, setToast] = useState(null);
  const toastTimer = useRef();

  // density + accent
  useEffect(() => {
    const r = document.documentElement;
    r.setAttribute('data-density', t.density);
    const pal = t.palette || TWEAK_DEFAULTS.palette;
    r.style.setProperty('--primary', pal[0]);
    r.style.setProperty('--primary-soft', pal[1]);
    r.style.setProperty('--primary-deep', pal[2]);
  }, [t.density, t.palette]);

  // boot
  useEffect(() => {(async () => {
      await Backend.init();
      try {
        const u = await Backend.currentUser();
        if (u) {await loadWorkspace(u);setPhase('ready');} else
        setPhase(inviteToken ? 'invite' : 'auth');
      } catch (e) {setPhase(inviteToken ? 'invite' : 'auth');}
    })();}, []);

  // poll for new notifications addressed to me
  useEffect(() => {
    if (phase !== 'ready') return;
    const iv = setInterval(() => { Backend.listNotifications().then(setNotifs).catch(() => {}); }, 15000);
    return () => clearInterval(iv);
  }, [phase, meId]);

  async function loadWorkspace(u) {
    const [mem, tks] = await Promise.all([Backend.listMembers(), Backend.listTasks()]);
    window.TASKFLOW_DATA.USERS = mem;
    setMembers(mem);setMeId(u.id);setTasks(tks);
    Backend.listProjects().then(setProjects).catch(() => setProjects([]));
    Backend.listNotifications().then(setNotifs).catch(() => setNotifs([]));
  }

  const onAuthed = async (u) => {
    if (inviteToken) history.replaceState({}, '', location.pathname);
    await loadWorkspace(u);setPhase('ready');
  };
  const logout = async () => {
    try {await Backend.signOut();} catch (e) {}
    setMeId(null);setMembers([]);setTasks([]);setProjects([]);setActiveProjectId(null);setProfileOpen(false);setUserMenu(false);setView('board');
    setPhase('auth');
  };

  // ---- helpers ----
  const flash = (text, icon = 'check', tone = 'done') => {
    setToast({ id: Date.now(), text, icon, tone });
    clearTimeout(toastTimer.current);
    toastTimer.current = setTimeout(() => setToast(null), 2600);
  };
  const onErr = (e) => flash(e && e.message || 'Couldn’t save — check your connection', 'clock', 'review');
  // send a notification to another teammate (never to myself)
  const notify = (recipient, kind, text, taskId) => {
    if (!recipient || recipient === meId) return;
    Backend.notify({ recipient, kind, text, taskId }).catch(() => {});
  };
  const notifyManagers = (kind, text, taskId, exceptId) => {
    members.forEach((u) => { if (u.role === 'manager' && u.id !== meId && u.id !== exceptId) notify(u.id, kind, text, taskId); });
  };
  const refreshNotifs = () => Backend.listNotifications().then(setNotifs).catch(() => {});
  const truncate = (s) => s.length > 26 ? s.slice(0, 24) + '…' : s;

  // ---- early returns (after all hooks) ----
  if (phase === 'booting') return <Splash />;
  if (phase === 'auth') return <AuthScreen appName={t.appName} onAuthed={onAuthed} />;
  if (phase === 'invite') return <AcceptInvite appName={t.appName} token={inviteToken} onAuthed={onAuthed} onCancel={() => setPhase('auth')} />;

  const me = userById(meId) || members[0];
  if (!me) return <Splash />;
  window.__TF = { claimVerb: t.claimVerb, rev };

  // ---- task mutations (optimistic local + persist via Backend) ----
  const patchTask = (id, nx, persist) => {
    setTasks((list) => list.map((x) => x.id === id ? nx : x));
    Backend.updateTask(id, persist).catch(onErr);
  };

  // spawn the next occurrence of a recurring task once it's done
  const spawnRecurrence = async (cur) => {
    const base = cur.due ? new Date(cur.due) : new Date();
    const next = new Date(base);
    if (cur.recurrence === 'daily') next.setDate(next.getDate() + 1);
    else if (cur.recurrence === 'weekly') next.setDate(next.getDate() + 7);
    else if (cur.recurrence === 'monthly') next.setMonth(next.getMonth() + 1);
    try {
      const task = await Backend.createTask({
        title: cur.title, desc: cur.desc, dept: cur.dept, priority: cur.priority,
        estimate: cur.estimate, due: next, proof: cur.proof,
        requiresApproval: cur.requiresApproval, assignedTo: cur.assignedTo || null,
        recurrence: cur.recurrence,
      });
      setTasks((list) => [task, ...list]);
      flash(`Next “${truncate(cur.title)}” scheduled for ${next.toLocaleDateString('en-US', { month: 'short', day: 'numeric' })}`, 'undo', 'open');
    } catch (e) {/* non-fatal */}
  };

  const store = {
    me, tasks, members, appName: t.appName, copy: { claimVerb: t.claimVerb },
    notifications: notifs, flash,

    claim(id) {
      const cur = tasks.find((x) => x.id === id);if (!cur) return;
      const at = new Date();
      const activity = [...cur.activity, { type: 'claimed', by: meId, at }];
      patchTask(id, { ...cur, status: 'in_progress', claimedBy: meId, claimedAt: at, activity },
      { status: 'in_progress', claimedBy: meId, claimedAt: at, activity });
      flash(`Claimed “${truncate(cur.title)}” — it’s yours`, 'hand');
      notify(cur.createdBy, 'claim', `${me.name.split(' ')[0]} claimed “${cur.title}”`, id);
    },
    openComplete(id) {setCompleteId(id);},
    complete(id, note, proofUrl) {
      const cur = tasks.find((x) => x.id === id);if (!cur) return;
      const review = cur.requiresApproval;const at = new Date();
      const activity = [...cur.activity, { type: 'completed', by: meId, at }];
      const nx = { ...cur, completedBy: meId, completedAt: at, completionNote: note || 'Marked complete.', proofUrl: proofUrl || null,
        status: review ? 'pending_approval' : 'completed', activity };
      patchTask(id, nx, { completedBy: meId, completedAt: at, completionNote: nx.completionNote, proofUrl: proofUrl || null, status: nx.status, activity });
      setCompleteId(null);
      if (review) {flash('Submitted for review ✦', 'checkCircle', 'review');
        notify(cur.createdBy, 'review', `${me.name.split(' ')[0]} submitted “${cur.title}” for review`, id);
        notifyManagers('review', `${me.name.split(' ')[0]} submitted “${cur.title}” for review`, id, cur.createdBy);} else
      {flash(`Completed “${truncate(cur.title)}” 🎉`, 'check');
      notify(cur.createdBy, 'done', `${me.name.split(' ')[0]} completed “${cur.title}”`, id);
      if (cur.recurrence) spawnRecurrence(cur);}
    },
    approve(id) {
      if (me.role !== 'manager') {flash('Only managers can approve work', 'clock', 'review');return;}
      const cur = tasks.find((x) => x.id === id);if (!cur) return;
      const at = new Date();
      const activity = [...cur.activity, { type: 'approved', by: meId, at }];
      patchTask(id, { ...cur, status: 'completed', approvedBy: meId, approvedAt: at, activity },
      { status: 'completed', approvedBy: meId, approvedAt: at, activity });
      flash(`Approved — logged to ${(userById(cur.completedBy) || me).name.split(' ')[0]}`, 'checkCircle');
      notify(cur.completedBy, 'approved', `Your work on “${cur.title}” was approved ✓`, id);
      if (cur.recurrence) spawnRecurrence(cur);
    },
    reject(id) {
      if (me.role !== 'manager') {flash('Only managers can review work', 'clock', 'review');return;}
      const cur = tasks.find((x) => x.id === id);if (!cur) return;
      const at = new Date();
      const activity = [...cur.activity, { type: 'reopened', by: meId, at }];
      patchTask(id, { ...cur, status: 'in_progress', completedBy: null, completedAt: null, completionNote: null, activity },
      { status: 'in_progress', completedBy: null, completedAt: null, completionNote: null, activity });
      flash('Sent back for changes', 'undo', 'review');
      notify(cur.completedBy, 'reopened', `“${cur.title}” was sent back for changes`, id);
    },
    comment(id, text) {
      const cur = tasks.find((x) => x.id === id);if (!cur) return;
      const comments = [...cur.comments, { by: meId, at: new Date(), text }];
      patchTask(id, { ...cur, comments }, { comments });
      const seen = new Set([meId]);
      [cur.createdBy, cur.claimedBy, cur.completedBy, cur.assignedTo].forEach((uid) => {
        if (uid && !seen.has(uid)) { seen.add(uid); notify(uid, 'comment', `${me.name.split(' ')[0]} commented on “${cur.title}”`, id); }
      });
    },
    async createTask(data) {
      try {
        const task = await Backend.createTask(data);
        setTasks((list) => [task, ...list]);
        setCreateOpen(false);
        flash(`Posted “${truncate(task.title)}” to the board`, 'plus');
        if (data.assignedTo) notify(data.assignedTo, 'assign', `${me.name.split(' ')[0]} assigned you “${task.title}”`, task.id);
      } catch (e) {onErr(e);}
    },
    editTask(id, data) {
      const cur = tasks.find((x) => x.id === id);if (!cur) return;
      const activity = [...cur.activity, { type: 'edited', by: meId, at: new Date() }];
      patchTask(id, { ...cur, ...data, activity }, { ...data, activity });
      setEditId(null);
      flash(`Updated “${truncate(data.title || cur.title)}”`, 'edit');
      if (data.assignedTo && data.assignedTo !== cur.assignedTo) notify(data.assignedTo, 'assign', `${me.name.split(' ')[0]} assigned you “${data.title || cur.title}”`, id);
    },
    async deleteTask(id) {
      const cur = tasks.find((x) => x.id === id);
      setTasks((list) => list.filter((x) => x.id !== id));
      setDetailId(null);setEditId(null);
      try {await Backend.deleteTask(id);flash(`Deleted “${truncate(cur && cur.title || 'task')}”`, 'trash', 'review');}
      catch (e) {onErr(e);}
    },

    // ---- projects (managers create/edit/delete) ----
    projects, activeProjectId, projectModal,
    openProject(id) {setActiveProjectId(id);},
    closeProject() {setActiveProjectId(null);},
    openProjectModal(id, confirmDelete) {setProjectModal({ id: typeof id === 'string' ? id : null, confirmDelete: !!confirmDelete });},
    closeProjectModal() {setProjectModal(null);},
    phasesFor,
    openPhases(id) {setPhasesFor(id);},
    closePhases() {setPhasesFor(null);},
    async createProject(data) {
      try {
        const p = await Backend.createProject(data);
        setProjects((list) => [...list, p]);
        setProjectModal(null);
        flash(`Created project “${truncate(p.name)}”`, 'plus');
      } catch (e) {onErr(e);}
    },
    async editProject(id, data) {
      const cur = projects.find((x) => x.id === id);
      setProjects((list) => list.map((x) => x.id === id ? { ...x, ...data } : x));
      setProjectModal(null);
      try {await Backend.updateProject(id, data);flash(`Updated “${truncate((data.name || (cur && cur.name)) || 'project')}”`, 'edit');}
      catch (e) {onErr(e);}
    },
    async deleteProject(id) {
      const cur = projects.find((x) => x.id === id);
      setProjects((list) => list.filter((x) => x.id !== id));
      setTasks((list) => list.map((x) => x.projectId === id ? { ...x, projectId: null } : x));
      setProjectModal(null);
      if (activeProjectId === id) setActiveProjectId(null);
      try {await Backend.deleteProject(id);flash(`Deleted project “${truncate(cur && cur.name || 'project')}”`, 'trash', 'review');}
      catch (e) {onErr(e);}
    },
    async setRole(uid, role) {
      const who = (members.find((x) => x.id === uid) || {}).name || 'Member';
      setMembers((list) => list.map((x) => x.id === uid ? { ...x, role } : x));
      window.TASKFLOW_DATA.USERS = window.TASKFLOW_DATA.USERS.map((x) => x.id === uid ? { ...x, role } : x);
      setRev((r) => r + 1);
      try {await Backend.setRole(uid, role);flash(`${who.split(' ')[0]} is now a ${role === 'manager' ? 'Manager' : 'Member'}`, role === 'manager' ? 'shield' : 'user');}
      catch (e) {onErr(e);}
    },
    async updateProfile(patch) {
      const m = members.find((x) => x.id === meId);
      const next = { ...m, ...patch };
      setMembers((list) => list.map((x) => x.id === meId ? next : x));
      window.TASKFLOW_DATA.USERS = window.TASKFLOW_DATA.USERS.map((x) => x.id === meId ? next : x);
      setRev((r) => r + 1);
      try {await Backend.updateProfile(patch);flash('Profile updated', 'check');} catch (e) {onErr(e);}
    },
    async savePrefs(patch) {
      const m = members.find((x) => x.id === meId);
      const next = { ...m, ...patch };
      setMembers((list) => list.map((x) => x.id === meId ? next : x));
      window.TASKFLOW_DATA.USERS = window.TASKFLOW_DATA.USERS.map((x) => x.id === meId ? next : x);
      try {await Backend.updateProfile(patch);} catch (e) {/* order already applied locally */}
    },

    openDetail(id) {setDetailId(id);setNotifOpen(false);setProfileOpen(false);},
    closeDetail() {setDetailId(null);},
    openCreate(pid, phaseId) {setCreateProjectId(typeof pid === 'string' ? pid : null);setCreatePhaseId(typeof phaseId === 'string' ? phaseId : null);setCreateOpen(true);},
    createProjectId, createPhaseId,
    openEdit(id) {setDetailId(null);setEditId(id);},
    openInvite() {setInviteOpen(true);},
    openMember(uid) {setMemberId(uid);},
    closeModals() {setCreateOpen(false);setCompleteId(null);setEditId(null);},
    clearNotifs() {setNotifs((list) => list.map((n) => ({ ...n, read: true })));Backend.markNotificationsRead().catch(() => {});},

    completeId, detailId, editId, sort: filters.sort,
    get filtered() {
      let list = tasks;
      const q = filters.q.trim().toLowerCase();
      if (q) list = list.filter((x) => (x.title + ' ' + x.desc + ' ' + x.dept).toLowerCase().includes(q));
      if (filters.dept !== 'All') list = list.filter((x) => x.dept === filters.dept);
      if (filters.priority !== 'All') list = list.filter((x) => x.priority === filters.priority);
      if (filters.assignee !== 'All') list = list.filter((x) => x.assignedTo === filters.assignee || x.claimedBy === filters.assignee);
      if (filters.mine) list = list.filter((x) => x.claimedBy === meId || x.completedBy === meId || x.assignedTo === meId);
      return list;
    }
  };

  const unread = notifs.filter((n) => !n.read).length;
  const isManager = me.role === 'manager';
  const NAV = [
  { key: 'board', label: t.boardTitle, short: 'Board', icon: 'board' },
  { key: 'projects', label: 'Projects', short: 'Projects', icon: 'folder' },
  { key: 'mine', label: 'My tasks', short: 'Mine', icon: 'user' },
  { key: 'team', label: 'Team', short: 'Team', icon: 'users' },
  { key: 'manager', label: 'Overview', short: 'Overview', icon: 'board' },
  { key: 'chat', label: 'Chat', short: 'Chat', icon: 'chat' }];


  return (
    <div className="tf-app">
      <header className="tf-top">
        <div className="tf-brand">
          <div className="tf-logo" style={{ backgroundColor: "rgb(61, 39, 193)" }}><Icon name="checkCircle" size={20} stroke={2.2} /></div>
          <div className="tf-brand-text"><b>{t.appName}</b><span>Task board</span></div>
        </div>

        <nav className="tf-nav">
          {NAV.map((n) =>
          <button key={n.key} className={'tf-nav-btn' + (view === n.key ? ' on' : '')} onClick={() => { setActiveProjectId(null); setView(n.key); }}>
              <Icon name={n.icon} size={16} stroke={2} />{n.label}
              {n.key === 'manager' && isManager && tasks.filter((x) => x.status === 'pending_approval').length > 0 &&
            <span className="tf-nav-badge">{tasks.filter((x) => x.status === 'pending_approval').length}</span>}
            </button>
          )}
        </nav>

        <div className="tf-top-right">
          {isManager && <Button variant="default" size="sm" icon="users" onClick={() => setInviteOpen(true)}>Invite</Button>}
          <Button variant="primary" size="sm" icon="plus" onClick={store.openCreate}>New task</Button>
          <div className="tf-bell-wrap">
            <button className="tf-icon-btn lg" onClick={() => setNotifOpen((o) => !o)}>
              <Icon name="bell" size={19} />
              {unread > 0 && <span className="tf-bell-dot">{unread}</span>}
            </button>
            {notifOpen && <NotifPanel store={store} onClose={() => setNotifOpen(false)} />}
          </div>
          <div className="tf-user-wrap">
            <button className="tf-user-btn" onClick={() => setUserMenu((o) => !o)}>
              <Avatar user={me} size={32} />
              <div className="tf-user-meta"><b>{me.name.split(' ')[0]}</b><span>{isManager ? 'Manager' : me.title}</span></div>
              <Icon name="chevronDown" size={14} />
            </button>
            {userMenu &&
            <>
                <div className="tf-pop-scrim" onClick={() => setUserMenu(false)}></div>
                <div className="tf-usermenu">
                  <div className="tf-usermenu-me">
                    <Avatar user={me} size={40} />
                    <div className="tf-usermenu-me-info"><b>{me.name}</b><span>{me.email || emailFor(me)}</span></div>
                  </div>
                  <button className="tf-usermenu-action" onClick={() => {setProfileOpen(true);setUserMenu(false);}}>
                    <Icon name="user" size={16} stroke={2} />View profile
                  </button>
                  {isManager &&
                <button className="tf-usermenu-action" onClick={() => {setInviteOpen(true);setUserMenu(false);}}>
                      <Icon name="users" size={16} stroke={2} />Invite teammates
                    </button>
                }
                  <div className="tf-usermenu-sep"></div>
                  <button className="tf-usermenu-action danger" onClick={logout}>
                    <Icon name="logOut" size={16} stroke={2} />Log out
                  </button>
                </div>
              </>
            }
          </div>
        </div>
      </header>

      {view === 'board' &&
      <div className="tf-subbar">
          <div className="tf-search">
            <Icon name="search" size={16} />
            <input value={filters.q} onChange={(e) => setFilters((f) => ({ ...f, q: e.target.value }))} placeholder="Search tasks…" />
          </div>
          <div className="tf-subbar-right">
            <div className="tf-select sm">
              <select value={filters.dept} onChange={(e) => setFilters((f) => ({ ...f, dept: e.target.value }))}>
                <option>All</option>
                {D.DEPARTMENTS.map((d) => <option key={d}>{d}</option>)}
              </select>
              <Icon name="chevronDown" size={14} />
            </div>
            <div className="tf-select sm">
              <select value={filters.priority} onChange={(e) => setFilters((f) => ({ ...f, priority: e.target.value }))}>
                <option value="All">Any priority</option>
                <option value="urgent">Urgent</option>
                <option value="high">High</option>
                <option value="medium">Medium</option>
                <option value="low">Low</option>
              </select>
              <Icon name="chevronDown" size={14} />
            </div>
            <div className="tf-select sm">
              <select value={filters.assignee} onChange={(e) => setFilters((f) => ({ ...f, assignee: e.target.value }))}>
                <option value="All">Anyone</option>
                {members.map((u) => <option key={u.id} value={u.id}>{u.name.split(' ')[0]}</option>)}
              </select>
              <Icon name="chevronDown" size={14} />
            </div>
            <button className={'tf-chip' + (filters.mine ? ' on' : '')} onClick={() => setFilters((f) => ({ ...f, mine: !f.mine }))}>
              <Icon name="user" size={14} stroke={2} />Only mine
            </button>
            <div className="tf-select sm">
              <select value={filters.sort} onChange={(e) => setFilters((f) => ({ ...f, sort: e.target.value }))}>
                <option value="due">Sort: Due date</option>
                <option value="priority">Sort: Priority</option>
                <option value="created">Sort: Newest</option>
                <option value="title">Sort: A–Z</option>
              </select>
              <Icon name="chevronDown" size={14} />
            </div>
            <div className="tf-layout-toggle">
              <button className={layout === 'board' ? 'on' : ''} onClick={() => setLayout('board')} title="Board"><Icon name="board" size={16} /></button>
              <button className={layout === 'list' ? 'on' : ''} onClick={() => setLayout('list')} title="List"><Icon name="list" size={16} /></button>
            </div>
          </div>
        </div>
      }

      <main className={'tf-main view-' + view}>
        {view === 'board' &&
        <>
            <ViewHeader title={t.boardTitle} sub="Everything the team is working on, in one place. Claim what you can take." />
            {tasks.length === 0 ?
          <EmptyBoard onCreate={store.openCreate} /> :
          layout === 'board' ? <BoardView store={store} /> : <ListView store={store} />}
          </>
        }
        {view === 'mine' &&
        <>
            <ViewHeader title={`${me.name.split(' ')[0]}’s tasks`} sub="What you’ve claimed, what’s due, and everything you’ve finished." />
            <MyTasksView store={store} />
          </>
        }
        {view === 'manager' &&
        <>
            <ViewHeader title="Overview" sub="Who’s doing what, what’s overdue, and what’s waiting on a manager." />
            <ManagerView store={store} />
          </>
        }
        {view === 'team' &&
        <>
            <ViewHeader title="Team" sub="Everyone in your workspace, what they’re working on, and their role." />
            <TeamView store={store} />
          </>
        }
        {view === 'projects' && (() => {
          const active = activeProjectId && projects.find((p) => p.id === activeProjectId);
          if (active) return <ProjectDetailView store={store} project={active} />;
          return (
            <>
              <ViewHeader title="Projects" sub="Group related work into projects. Open one to see all of its tasks." />
              <ProjectsView store={store} />
            </>
          );
        })()}
        {view === 'chat' && <ChatView store={store} />}
      </main>

      <nav className="tf-mobnav">
        {NAV.map((n) => {
          const pending = n.key === 'manager' && isManager && tasks.filter((x) => x.status === 'pending_approval').length;
          return (
            <button key={n.key} className={'tf-mobnav-btn' + (view === n.key ? ' on' : '')} onClick={() => { setActiveProjectId(null); setView(n.key); }}>
              <span className="tf-mobnav-ic">
                <Icon name={n.icon} size={20} stroke={2} />
                {pending ? <span className="tf-mobnav-badge">{pending}</span> : null}
              </span>
              <span>{n.short}</span>
            </button>);
        })}
      </nav>

      {createOpen && <CreateModal store={store} />}
      {editId && <EditModal store={store} />}
      {completeId && <CompleteModal store={store} />}
      {detailId && <TaskDetail store={store} />}
      {projectModal && <ProjectModal store={store} />}
      {phasesFor && <PhasesModal store={store} projectId={phasesFor} />}
      {profileOpen && <ProfileModal store={store} onClose={() => setProfileOpen(false)} onLogout={logout} />}
      {memberId && <MemberModal store={store} uid={memberId} onClose={() => setMemberId(null)} />}
      {inviteOpen && <InviteModal store={store} onClose={() => setInviteOpen(false)} />}
      <Toast toast={toast} />

      <TweaksPanel>
        <TweakSection label="Theme" />
        <TweakColor label="Accent" value={t.palette}
        options={[
        ['#D9824F', '#fbf1e9', '#8a4a26'],
        ['#3FA779', '#e8f4ee', '#256a4c'],
        ['#B06AB3', '#f4ebf4', '#6e3d72'],
        ['#5B8DEF', '#eaf1fd', '#2f5bb0'],
        ['#C9533F', '#fbeae6', '#7e2f22']]
        }
        onChange={(v) => setTweak('palette', v)} />
        <TweakSection label="Layout" />
        <TweakRadio label="Density" value={t.density} options={['compact', 'regular', 'comfy']}
        onChange={(v) => setTweak('density', v)} />
        <TweakSection label="Copy" />
        <TweakText label="Workspace name" value={t.appName} onChange={(v) => setTweak('appName', v)} />
        <TweakText label="Board tab label" value={t.boardTitle} onChange={(v) => setTweak('boardTitle', v)} />
        <TweakText label="Claim verb" value={t.claimVerb} onChange={(v) => setTweak('claimVerb', v)} />
      </TweaksPanel>
    </div>);

}

function ViewHeader({ title, sub }) {
  return (
    <div className="tf-viewhead">
      <h1 dangerouslySetInnerHTML={{ __html: title }}></h1>
      <p>{sub}</p>
    </div>);

}

function EmptyBoard({ onCreate }) {
  return (
    <div className="tf-empty-board">
      <div className="tf-empty-ic"><Icon name="board" size={30} stroke={1.8} /></div>
      <h2>Your board is empty</h2>
      <p>Post the first task and your team can start claiming work. Anything you add is shared with everyone in the workspace.</p>
      <Button variant="primary" size="md" icon="plus" onClick={onCreate}>Create the first task</Button>
    </div>);

}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
