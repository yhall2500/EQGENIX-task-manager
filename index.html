<script>
/* ============================================================
   TaskFlow — Backend abstraction (plain JS, window.Backend)
   Two implementations behind one async API:
     • supabase : real shared backend (auth + Postgres) when
                  window.TASKFLOW_CONFIG has URL + anon key
     • local    : localStorage demo so the app runs with no setup
   App code only ever calls Backend.* — never Supabase directly.
   ============================================================ */
(function () {
  const CFG = window.TASKFLOW_CONFIG || {};
  const SB_READY = !!(CFG.SUPABASE_URL && CFG.SUPABASE_ANON_KEY && window.supabase);
  const MODE = SB_READY ? 'supabase' : 'local';
  const COLORS = ['#D9824F', '#5B8DEF', '#3FA779', '#B06AB3', '#E0A33E', '#D96A6A', '#5FB0A6', '#C9655A'];
  const rid = (p) => p + Math.random().toString(36).slice(2, 9);
  const colorFor = (key) => { let h = 0; for (const c of (key || '')) h = (h * 31 + c.charCodeAt(0)) >>> 0; return COLORS[h % COLORS.length]; };

  // revive date strings → Date objects on a task coming out of storage / db
  const DATE_FIELDS = ['due', 'createdAt', 'claimedAt', 'completedAt', 'approvedAt'];
  function reviveTask(t) {
    const x = { ...t };
    DATE_FIELDS.forEach(f => { x[f] = x[f] ? new Date(x[f]) : null; });
    x.comments = (x.comments || []).map(c => ({ ...c, at: new Date(c.at) }));
    x.activity = (x.activity || []).map(a => ({ ...a, at: new Date(a.at) }));
    return x;
  }

  /* =========================================================
     LOCAL implementation (localStorage)
     ========================================================= */
  const LKEY = 'tf_db_v2';
  const Local = (() => {
    function fresh() {
      const D = window.TASKFLOW_DATA;
      // seed members + tasks so the demo isn't empty; password for all = "taskflow"
      const members = (D.USERS || []).map((u, i) => ({
        id: u.id, email: window.emailFor ? window.emailFor(u) : (u.name.split(' ')[0].toLowerCase() + '@brightside.studio'),
        pass: btoa('taskflow'), name: u.name, title: u.title, role: u.role, color: u.color || COLORS[i % COLORS.length],
      }));
      const tasks = (D.TASKS || []).map(t => {
        const c = { ...t };
        DATE_FIELDS.forEach(f => { if (c[f] instanceof Date) c[f] = c[f].toISOString(); });
        c.comments = (c.comments || []).map(x => ({ ...x, at: x.at instanceof Date ? x.at.toISOString() : x.at }));
        c.activity = (c.activity || []).map(x => ({ ...x, at: x.at instanceof Date ? x.at.toISOString() : x.at }));
        return c;
      });
      return { workspace: { name: (D.business || 'TaskFlow') + ' workspace' }, members, tasks, projects: (D.PROJECTS || []).map(p => ({ ...p, due: p.due instanceof Date ? p.due.toISOString() : p.due, archived: false, createdBy: (members[0] || {}).id || null, createdAt: new Date().toISOString() })), invites: [], messages: [], personal: [], notifications: [], sessionUserId: null, seeded: true };
    }
    function read() {
      try { const r = localStorage.getItem(LKEY); if (r) { const d = JSON.parse(r); if (!d.messages) d.messages = []; if (!d.personal) d.personal = []; if (!d.notifications) d.notifications = []; if (!d.projects) d.projects = []; return d; } } catch (e) {}
      const db = fresh(); write(db); return db;
    }
    function write(db) { try { localStorage.setItem(LKEY, JSON.stringify(db)); } catch (e) {} }
    const cbs = [];
    const emit = () => { const u = api.session(); cbs.forEach(cb => cb(u)); };
    const pub = (m) => m ? ({ id: m.id, email: m.email, name: m.name, title: m.title, role: m.role, color: m.color, worknowOrder: m.worknowOrder || null, worknowMode: m.worknowMode || null }) : null;

    const api = {
      session() { const db = read(); return pub(db.members.find(m => m.id === db.sessionUserId)); },
      onAuth(cb) { cbs.push(cb); },
      signUp({ email, password, name, title, inviteToken }) {
        const db = read(); email = (email || '').trim().toLowerCase();
        if (!email || !password) return Promise.reject(new Error('Email and password are required.'));
        if (db.members.some(m => m.email === email)) return Promise.reject(new Error('An account with that email already exists. Try logging in.'));
        let role = db.members.length === 0 ? 'manager' : 'member';
        let inv = null;
        if (inviteToken) { inv = db.invites.find(i => i.token === inviteToken && !i.accepted); if (inv) { role = inv.role; inv.accepted = true; } }
        const m = { id: rid('u_'), email, pass: btoa(password), name: name || email.split('@')[0], title: title || (role === 'manager' ? 'Manager' : 'Team member'), role, color: colorFor(email) };
        db.members.push(m); db.sessionUserId = m.id; write(db); emit();
        return Promise.resolve(pub(m));
      },
      signIn({ email, password }) {
        const db = read(); email = (email || '').trim().toLowerCase();
        const m = db.members.find(x => x.email === email);
        if (!m || m.pass !== btoa(password || '')) return Promise.reject(new Error('Wrong email or password.'));
        db.sessionUserId = m.id; write(db); emit();
        return Promise.resolve(pub(m));
      },
      signOut() { const db = read(); db.sessionUserId = null; write(db); emit(); return Promise.resolve(); },
      updateProfile(patch) {
        const db = read(); const m = db.members.find(x => x.id === db.sessionUserId);
        if (m) { Object.assign(m, patch); write(db); } return Promise.resolve(pub(m));
      },
      listMembers() { return Promise.resolve(read().members.map(pub)); },
      listTasks() { return Promise.resolve(read().tasks.map(reviveTask)); },
      createTask(data) {
        const db = read(); const now = new Date().toISOString();
        const t = { id: rid('task_'), ...serializeTask(data), createdBy: db.sessionUserId, createdAt: now,
          status: 'open', claimedBy: null, claimedAt: null, completedBy: null, completedAt: null, approvedBy: null, approvedAt: null,
          completionNote: null, comments: [], activity: [{ type: 'created', by: db.sessionUserId, at: now }] };
        db.tasks.unshift(t); write(db); return Promise.resolve(reviveTask(t));
      },
      updateTask(id, patch) {
        const db = read(); const t = db.tasks.find(x => x.id === id);
        if (t) { Object.assign(t, serializeTask(patch)); write(db); } return Promise.resolve(t ? reviveTask(t) : null);
      },
      createInvite({ email, role }) {
        const db = read(); email = (email || '').trim().toLowerCase();
        let inv = db.invites.find(i => i.email === email && !i.accepted);
        if (!inv) { inv = { token: rid('inv_'), email, role: role || 'member', accepted: false, at: new Date().toISOString() }; db.invites.push(inv); write(db); }
        return Promise.resolve(inv);
      },
      listInvites() { return Promise.resolve(read().invites.filter(i => !i.accepted)); },
      getInvite(token) { return Promise.resolve(read().invites.find(i => i.token === token) || null); },
      setRole(uid, role) {
        const db = read(); const m = db.members.find(x => x.id === uid);
        if (m) { m.role = role; write(db); } return Promise.resolve(pub(m));
      },
      deleteTask(id) { const db = read(); db.tasks = db.tasks.filter(x => x.id !== id); write(db); return Promise.resolve(true); },
      listProjects() {
        const db = read();
        return Promise.resolve((db.projects || []).filter(p => !p.archived)
          .map(p => ({ ...p, due: p.due ? new Date(p.due) : null, createdAt: p.createdAt ? new Date(p.createdAt) : null })));
      },
      createProject(data) {
        const db = read(); const now = new Date().toISOString();
        const defaults = (window.TASKFLOW_DATA.DEFAULT_PHASES || []).map(p => ({ ...p }));
        const p = { id: rid('proj_'), name: data.name, description: data.description || null,
          color: data.color || COLORS[(db.projects || []).length % COLORS.length],
          due: data.due ? new Date(data.due).toISOString() : null,
          phases: data.phases || defaults,
          archived: false, createdBy: db.sessionUserId, createdAt: now };
        db.projects = db.projects || []; db.projects.push(p); write(db);
        return Promise.resolve({ ...p, due: p.due ? new Date(p.due) : null, createdAt: new Date(p.createdAt) });
      },
      updateProject(id, patch) {
        const db = read(); const p = (db.projects || []).find(x => x.id === id);
        if (p) { const np = { ...patch }; if (np.due instanceof Date) np.due = np.due.toISOString(); Object.assign(p, np); write(db); }
        return Promise.resolve(p ? { ...p, due: p.due ? new Date(p.due) : null } : null);
      },
      deleteProject(id) {
        const db = read();
        db.projects = (db.projects || []).filter(x => x.id !== id);
        db.tasks.forEach(t => { if (t.projectId === id) t.projectId = null; });
        write(db); return Promise.resolve(true);
      },
      listMessages() { const db = read(); return Promise.resolve((db.messages || []).map(m => ({ ...m, at: new Date(m.at) }))); },
      sendMessage(text) {
        const db = read(); const m = { id: rid('m_'), userId: db.sessionUserId, body: text, at: new Date().toISOString() };
        db.messages.push(m); write(db); return Promise.resolve({ ...m, at: new Date(m.at) });
      },
      listPersonal() {
        const db = read();
        return Promise.resolve((db.personal || []).filter(p => p.owner === db.sessionUserId)
          .map(p => ({ ...p, due: p.due ? new Date(p.due) : null })));
      },
      addPersonal({ title, due }) {
        const db = read();
        const p = { id: rid('p_'), owner: db.sessionUserId, title, done: false, due: due ? new Date(due).toISOString() : null, at: new Date().toISOString() };
        db.personal.push(p); write(db);
        return Promise.resolve({ ...p, due: p.due ? new Date(p.due) : null });
      },
      setPersonalDone(id, done) {
        const db = read(); const p = db.personal.find(x => x.id === id);
        if (p) { p.done = done; write(db); } return Promise.resolve(true);
      },
      deletePersonal(id) {
        const db = read(); db.personal = db.personal.filter(x => x.id !== id); write(db);
        return Promise.resolve(true);
      },
      listNotifications() {
        const db = read();
        return Promise.resolve((db.notifications || []).filter(n => n.recipient === db.sessionUserId)
          .sort((a, b) => new Date(b.at) - new Date(a.at)).slice(0, 40)
          .map(n => ({ ...n, at: new Date(n.at) })));
      },
      notify({ recipient, kind, text, taskId }) {
        const db = read();
        db.notifications.push({ id: rid('n_'), recipient, kind, text, taskId: taskId || null, read: false, at: new Date().toISOString() });
        write(db); return Promise.resolve(true);
      },
      markNotificationsRead() {
        const db = read();
        db.notifications.forEach(n => { if (n.recipient === db.sessionUserId) n.read = true; });
        write(db); return Promise.resolve(true);
      },
      uploadProof(file) {
        return new Promise((res, rej) => {
          const fr = new FileReader();
          fr.onload = () => res(fr.result); // data URL works offline
          fr.onerror = () => rej(new Error('Could not read the file'));
          fr.readAsDataURL(file);
        });
      },
    };
    return api;
  })();

  // turn app-shape (camelCase, Date) into storable strings; used by local + as map source
  function serializeTask(d) {
    const o = { ...d };
    DATE_FIELDS.forEach(f => { if (o[f] instanceof Date) o[f] = o[f].toISOString(); });
    if (o.comments) o.comments = o.comments.map(c => ({ ...c, at: c.at instanceof Date ? c.at.toISOString() : c.at }));
    if (o.activity) o.activity = o.activity.map(a => ({ ...a, at: a.at instanceof Date ? a.at.toISOString() : a.at }));
    return o;
  }

  /* =========================================================
     SUPABASE implementation
     ========================================================= */
  const Supa = (() => {
    if (!SB_READY) return null;
    const sb = window.supabase.createClient(CFG.SUPABASE_URL, CFG.SUPABASE_ANON_KEY);
    const pubFromProfile = (p) => p ? ({ id: p.id, email: p.email, name: p.full_name, title: p.title, role: p.role, color: p.color, worknowOrder: p.worknow_order || null, worknowMode: p.worknow_mode || null }) : null;
    // map db row (snake_case) → app task shape (camelCase)
    const fromRow = (r) => reviveTask({
      id: r.id, title: r.title, desc: r.description, dept: r.dept, priority: r.priority, estimate: r.estimate,
      due: r.due, status: r.status, requiresApproval: r.requires_approval, proof: r.proof, assignedTo: r.assigned_to, recurrence: r.recurrence, projectId: r.project_id, phaseId: r.phase_id,
      createdBy: r.created_by, createdAt: r.created_at, claimedBy: r.claimed_by, claimedAt: r.claimed_at,
      completedBy: r.completed_by, completedAt: r.completed_at, approvedBy: r.approved_by, approvedAt: r.approved_at,
      completionNote: r.completion_note, proofUrl: r.proof_url, comments: r.comments || [], activity: r.activity || [],
    });
    // map app patch → db columns
    const toRow = (d) => {
      const m = { title: 'title', desc: 'description', dept: 'dept', priority: 'priority', estimate: 'estimate',
        due: 'due', status: 'status', requiresApproval: 'requires_approval', proof: 'proof', assignedTo: 'assigned_to', recurrence: 'recurrence', projectId: 'project_id', phaseId: 'phase_id',
        claimedBy: 'claimed_by', claimedAt: 'claimed_at', completedBy: 'completed_by', completedAt: 'completed_at',
        approvedBy: 'approved_by', approvedAt: 'approved_at', completionNote: 'completion_note', proofUrl: 'proof_url', comments: 'comments', activity: 'activity' };
      const out = {};
      Object.keys(d).forEach(k => { if (m[k]) { let v = d[k]; if (v instanceof Date) v = v.toISOString();

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);

  const clampToViewport = React.useCallback(() => {

    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;

      else if (t === '__deactivate_edit_mode') setOpen(false);

    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };

    };

      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };

    window.addEventListener('mouseup', up);
  };

      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-omelette-chrome=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>

      </div>
    </>

}

function TweakToggle({ label, value, onChange }) {

      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>

  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"

);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color

// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

  const meta = window.TASKFLOW_DATA.PRIORITY[priority];
  return (
    <span className={'tf-prio ' + PRIORITY_CLS[priority]}>
      <Icon name="flag" size={12} stroke={2.2} />{meta.label}
    </span>);

}
function DeptTag({ dept }) {
  return <span className="tf-dept">{dept}</span>;
}
function ProofTag({ proof }) {
  const map = { note: ['note', 'Note'], file: ['paperclip', 'File'], photo: ['camera', 'Photo'], checklist: ['checkCircle', 'Checklist'] };
  const [icon, label] = map[proof] || map.note;
  return <span className="tf-proof"><Icon name={icon} size={12} stroke={2} />{label}</span>;
}

// ---------- button ----------
function Button({ variant = 'default', size = 'md', icon, children, onClick, disabled, full, title }) {
  return (
    <button className={`tf-btn ${variant} ${size}${full ? ' full' : ''}`} onClick={onClick} disabled={disabled} title={title} style={{ backgroundColor: "rgb(255, 156, 156)" }}>
      {icon && <Icon name={icon} size={size === 'sm' ? 15 : 17} stroke={2} />}
      {children != null && children !== false && <span className="tf-btn-label">{children}</span>}
    </button>);

}

Object.assign(window, {
  relTime, dueLabel, userById, initials,
  Icon, Avatar, AvatarStack,
  StatusBadge, PriorityTag, DeptTag, ProofTag, Button,
  STATUS_META
});
</script>
<script type="text/babel">
/* ============================================================
   TaskFlow — Auth (login / signup / accept-invite), Invite, Profile
   Talks only to window.Backend. Exports to window.
   ============================================================ */

function emailFor(u) { return u.name.split(' ')[0].toLowerCase() + '@brightside.studio'; }
window.emailFor = emailFor;

const IS_LIVE = () => window.Backend && window.Backend.mode === 'supabase';

/* ---------- shared split-screen shell ---------- */
function AuthShell({ appName, children }) {
  return (
    <div className="tf-auth">
      <div className="tf-auth-art" aria-hidden="true">
        <div className="tf-auth-art-inner">
          <div className="tf-auth-art-glow"></div>

            <h2>One board. The whole team.</h2>

            <div className="tf-auth-mini">

              ))}
            </div>

        </div>

          </span>

/* ---------- login + signup ---------- */
function AuthScreen({ appName, onAuthed }) {
  const [tab, setTab] = useState('login'); // login | signup
  const [name, setName] = useState('');
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState('');
  const [info, setInfo] = useState('');

  const emailOk = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email.trim());
  const canSubmit = emailOk && password.length >= 6 && (tab === 'login' || name.trim().length > 1);

  const submit = async () => {
    if (!canSubmit || busy) return;
    setBusy(true); setErr(''); setInfo('');
    try {
      const user = tab === 'login'
        ? await Backend.signIn({ email, password })
        : await Backend.signUp({ email, password, name: name.trim() });
      onAuthed(user);
    } catch (e) {
      if (e.code === 'confirm') { setInfo('Almost there — check your email to confirm your account, then log in.'); setTab('login'); }
      else setErr(e.message || 'Something went wrong. Try again.');
    } finally { setBusy(false); }
  };

  const fillDemo = () => { setTab('login'); setEmail('maya@brightside.studio'); setPassword('taskflow'); setErr(''); };

  return (
    <AuthShell appName={appName}>

      </div>

      <div className="tf-auth-tabs">

      <label className="tf-auth-label">Password</label>
      <div className="tf-auth-input"><Icon name="shield" size={17} />

/* ---------- accept an invite ---------- */
function AcceptInvite({ appName, token, onAuthed, onCancel }) {
  const [invite, setInvite] = useState(undefined); // undefined=loading, null=not found
  const [name, setName] = useState('');
  const [password, setPassword] = useState('');
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState('');

  useEffect(() => { Backend.getInvite(token).then(setInvite).catch(() => setInvite(null)); }, [token]);

  const canSubmit = invite && name.trim().length > 1 && password.length >= 6;
  const submit = async () => {
    if (!canSubmit || busy) return;
    setBusy(true); setErr('');
    try {
      const user = await Backend.signUp({ email: invite.email, password, name: name.trim(), inviteToken: token });
      onAuthed(user);
    } catch (e) {
      if (e.code === 'confirm') setErr('Check your email to confirm your account, then log in.');
      else setErr(e.message || 'Could not accept the invite.');
    } finally { setBusy(false); }
  };

  return (
    <AuthShell appName={appName}>
      <div className="tf-auth-brand">
        <div className="tf-logo"><Icon name="checkCircle" size={20} stroke={2.2} /></div>
        <b>{appName}</b>

        <p className="tf-auth-sub">Checking your invite…</p>

        <>

          <p className="tf-auth-sub">Set up your account for <b>{invite.email}</b>.</p>

          <label className="tf-auth-label">Full name</label>
          <div className="tf-auth-input"><Icon name="user" size={17} />
            <input value={name} onChange={e => setName(e.target.value)} placeholder="Your name" autoFocus />
          </div>
          <label className="tf-auth-label">Create a password</label>
          <div className="tf-auth-input"><Icon name="shield" size={17} />
            <input type="password" value={password} onChange={e => setPassword(e.target.value)}

/* ---------- invite teammates (managers) ---------- */
function InviteModal({ store, onClose }) {
  const [email, setEmail] = useState('');
  const [role, setRole] = useState('member');
  const [invites, setInvites] = useState([]);
  const [link, setLink] = useState(null);
  const [busy, setBusy] = useState(false);
  const [copied, setCopied] = useState(false);

  const refresh = () => Backend.listInvites().then(setInvites).catch(() => {});
  useEffect(() => { refresh(); }, []);

  const emailOk = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email.trim());
  const send = async () => {
    if (!emailOk || busy) return;
    setBusy(true);
    try {
      const inv = await Backend.createInvite({ email, role });
      const url = Backend.inviteLink(inv.token);
      let emailed = false;
      // try the optional Netlify function that emails the link; silently fall back if not deployed
      if (IS_LIVE()) {
        try {
          const r = await fetch('/.netlify/functions/send-invite', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ to: inv.email, link: url, inviter: store.me.name, workspace: store.appName, role: inv.role }),
          });
          emailed = r.ok;
        } catch (e) {/* fall back to link */}
      }
      setLink({ url, email: inv.email, role: inv.role, emailed });
      if (emailed) store.flash && store.flash(`Invite emailed to ${inv.email}`, 'mail');
      setEmail(''); setRole('member'); refresh();
    } catch (e) { store.flash && store.flash(e.message || 'Could not create invite', 'clock', 'review'); }
    finally { setBusy(false); }
  };
  const copy = (url) => { try { navigator.clipboard.writeText(url); setCopied(true); setTimeout(() => setCopied(false), 1600); } catch (e) {} };
  const mailto = (to, url) => `mailto:${to}?subject=${encodeURIComponent('Join our ' + store.appName + ' board')}&body=${encodeURIComponent('You’ve been invited to our team task board. Set up your account here:\n\n' + url)}`;

  return (

                <button className={'tf-role-opt' + (role === 'manager' ? ' on' : '')} onClick={() => setRole('manager')}>Manager</button>
              </div>
            </div>
            <button className="tf-btn primary md tf-invite-send" disabled={!emailOk || busy} onClick={send}>
              {busy ? <><span className="tf-spinner"></span>Creating…</> : <><Icon name="send" size={16} stroke={2} />Create invite</>}
            </button>
          </div>

          {link && (
            <div className="tf-invite-link">
              <div className="tf-invite-link-head"><Icon name={link.emailed ? 'mail' : 'link'} size={15} stroke={2} />{link.emailed ? <>Emailed to <b>{link.email}</b> ✓</> : <>Invite link for <b>{link.email}</b></>}</div>
              <div className="tf-invite-link-row">
                <input readOnly value={link.url} onFocus={e => e.target.select()} />
                <button className="tf-btn default sm" onClick={() => copy(link.url)}>{copied ? 'Copied!' : 'Copy'}</button>
              </div>
              <div className="tf-invite-link-acts">
                <a className="tf-btn ghost sm" href={mailto(link.email, link.url)}><Icon name="mail" size={15} stroke={2} />Email it</a>
                <span className="tf-invite-fine">{link.emailed ? 'We emailed them the link — you can also copy it here as a backup.' : IS_LIVE() ? 'Send this link to your teammate — they set their own password.' : 'Demo: open this link in a new tab to accept.'}</span>
              </div>
            </div>
          )}

          <div className="tf-invite-pending">
            <h3>Pending invites</h3>
            {invites.length === 0 ? (
              <p className="tf-invite-empty">No pending invites.</p>
            ) : invites.map(i => (
              <div key={i.token} className="tf-invite-row">
                <span className="tf-invite-av"><Icon name="mail" size={14} stroke={2} /></span>
                <div className="tf-invite-row-main"><b>{i.email}</b><span>{i.role === 'manager' ? 'Manager' : 'Member'} · pending</span></div>
                <button className="tf-btn ghost sm" onClick={() => copy(Backend.inviteLink(i.token))}>Copy link</button>
              </div>
            ))}
          </div>
        </div>
      </div>

Object.assign(window, { AuthScreen, AcceptInvite, InviteModal, ProfileModal, emailFor });

<script type="text/babel">
/* ============================================================
   TaskFlow — views: TaskCard, Board, List, My Tasks, Manager
   Requires React + ui.jsx globals.
   Props pattern: components receive { store } with state + actions.
   ============================================================ */

// ---------- task sorting ----------
const PRIO_RANK = { urgent: 0, high: 1, medium: 2, low: 3 };
const dueVal = (t) => t.due ? new Date(t.due).getTime() : Infinity;
function taskComparator(sort) {
  return (a, b) => {
    switch (sort) {
      case 'priority': {
        const pa = PRIO_RANK[a.priority] ?? 9, pb = PRIO_RANK[b.priority] ?? 9;
        if (pa !== pb) return pa - pb;
        return dueVal(a) - dueVal(b);
      }
      case 'created':
        return new Date(b.createdAt) - new Date(a.createdAt);
      case 'title':
        return (a.title || '').localeCompare(b.title || '');
      case 'due':
      default:
        return dueVal(a) - dueVal(b);
    }
  };
}

// ---------- contextual action for a task ----------
function taskAction(task, me) {
  const claimVerb = (window.__TF && window.__TF.claimVerb) || 'Claim';
  if (task.status === 'open') return { key: 'claim', label: claimVerb + ' task', icon: 'hand', variant: 'primary' };
  if (task.status === 'in_progress') {
    if (task.claimedBy === me.id) return { key: 'complete', label: 'Mark complete', icon: 'check', variant: 'primary' };
    return { key: 'view', label: 'Open', icon: null, variant: 'ghost' };
  }
  if (task.status === 'pending_approval') {
    if (me.role === 'manager') return { key: 'review', label: 'Review', icon: 'checkCircle', variant: 'primary' };
    return { key: 'view', label: 'Awaiting review', icon: 'clock', variant: 'ghost' };
  }
  return { key: 'view', label: 'View', icon: null, variant: 'ghost' };
}

// ---------- task card ----------
function TaskCard({ task, store }) {
  const me = store.me;
  const action = taskAction(task, me);
  const completed = task.status === 'completed';
  const rawDue = dueLabel(task.due);
  const due = completed
    ? { state: 'done', text: task.due ? 'Due ' + new Date(task.due).toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' }) : 'No due date' }
    : rawDue;
  const claimer = userById(task.claimedBy);
  const doer = userById(task.completedBy);
  const assignee = task.assignedTo ? userById(task.assignedTo) : null;
  const overdue = rawDue.state === 'overdue' && !completed;
  const project = task.projectId ? (store.projects || []).find(p => p.id === task.projectId) : null;
  const phase = project && project.phases && task.phaseId ? project.phases.find(p => p.id === task.phaseId) : null;

  const onAction = (e) => {
    e.stopPropagation();
    if (action.key === 'claim') store.claim(task.id);
    else if (action.key === 'complete') store.openComplete(task.id);
    else if (action.key === 'review') store.openDetail(task.id);
    else store.openDetail(task.id);
  };

  return (
    <article className={'tf-card' + (overdue ? ' is-overdue' : '')} onClick={() => store.openDetail(task.id)}>
      <div className="tf-card-top">
        <PriorityTag priority={task.priority} />
        <DeptTag dept={task.dept} />
        {phase && <span className="tf-phase-tag"><Icon name="flag" size={10} stroke={2.4} />{phase.name}</span>}
      </div>
      <h3 className="tf-card-title">{task.title}</h3>
      <p className="tf-card-desc">{task.desc}</p>

      <div className="tf-card-meta">
        <span className={'tf-due ' + due.state}><Icon name="clock" size={13} stroke={2} />{due.text}</span>
        <span className="tf-est"><Icon name="sparkle" size={12} stroke={2} />{task.estimate}</span>
        {task.recurrence && <span className="tf-repeat"><Icon name="repeat" size={12} stroke={2} />{recurLabel(task.recurrence)}</span>}
        {task.requiresApproval && <ProofTag proof={task.proof} />}
      </div>

      <div className="tf-card-foot">
        <div className="tf-card-who">
          {task.status === 'completed' || task.status === 'pending_approval' ? (
            doer ? <><Avatar user={doer} size={24} /><span className="tf-who-label">{task.status === 'completed' ? 'Done by' : 'Submitted by'} <b>{doer.name.split(' ')[0]}</b></span></> : null
          ) : claimer ? (
            <><Avatar user={claimer} size={24} /><span className="tf-who-label">Claimed by <b>{claimer.id === me.id ? 'you' : claimer.name.split(' ')[0]}</b></span></>
          ) : assignee ? (
            <><Avatar user={assignee} size={24} /><span className="tf-who-label">For <b>{assignee.id === me.id ? 'you' : assignee.name.split(' ')[0]}</b></span></>
          ) : (
            <span className="tf-who-label muted"><Icon name="users" size={14} stroke={2} />Open to the team</span>
          )}
        </div>
        <Button size="sm" variant={action.variant} icon={action.icon} onClick={onAction}
          disabled={action.key === 'view' && action.label === 'Awaiting review'}>
          {action.label}
        </Button>
      </div>
    </article>
  );
}

// ---------- board ----------
const COLUMNS = [
  { status: 'open',             title: 'Open',        hint: 'Up for grabs' },
  { status: 'in_progress',      title: 'In progress', hint: 'Being worked on' },
  { status: 'pending_approval', title: 'Needs review',hint: 'Awaiting a manager' },
  { status: 'completed',        title: 'Completed',   hint: 'Done & logged' },
];

function BoardColumn({ col, tasks, store }) {
  return (
    <section className={'tf-col ' + col.status}>
      <header className="tf-col-head">
        <div>
          <h2>{col.title}<span className="tf-col-count">{tasks.length}</span></h2>
          <p>{col.hint}</p>
        </div>
        {col.status === 'open' && (
          <button className="tf-col-add" title="New task" onClick={store.openCreate}><Icon name="plus" size={16} stroke={2.4} /></button>
        )}
      </header>
      <div className="tf-col-body">
        {tasks.length === 0 ? (
          <div className="tf-col-empty">Nothing here</div>
        ) : tasks.map(t => <TaskCard key={t.id} task={t} store={store} />)}
      </div>
    </section>
  );
}

function BoardView({ store }) {
  const tasks = store.filtered;
  const cmp = taskComparator(store.sort);
  const byStatus = (s) => tasks.filter(t => t.status === s).slice().sort(cmp);
  return (
    <div className="tf-board">
      {COLUMNS.map(col => <BoardColumn key={col.status} col={col} tasks={byStatus(col.status)} store={store} />)}
    </div>
  );
}

// ---------- list view ----------
function ListRow({ task, store }) {
  const me = store.me;
  const action = taskAction(task, me);
  const completed = task.status === 'completed';
  const rawDue = dueLabel(task.due);
  const due = completed
    ? { state: 'done', text: task.due ? new Date(task.due).toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' }) : 'No due date' }
    : rawDue;
  const who = userById(task.completedBy) || userById(task.claimedBy);
  const overdue = rawDue.state === 'overdue' && !completed;
  const onAction = (e) => {
    e.stopPropagation();
    if (action.key === 'claim') store.claim(task.id);
    else if (action.key === 'complete') store.openComplete(task.id);
    else store.openDetail(task.id);
  };
  return (
    <tr className={'tf-row' + (overdue ? ' is-overdue' : '')} onClick={() => store.openDetail(task.id)}>
      <td className="c-title">
        <div className="tf-row-title">{task.title}</div>
        <div className="tf-row-sub"><DeptTag dept={task.dept} /><PriorityTag priority={task.priority} /></div>
      </td>
      <td><StatusBadge status={task.status} /></td>
      <td className={'c-due ' + due.state}>{due.text}</td>
      <td className="c-who">{who ? <Avatar user={who} size={26} /> : <span className="muted">—</span>}</td>
      <td className="c-act">
        <Button size="sm" variant={action.variant} icon={action.icon} onClick={onAction}
          disabled={action.label === 'Awaiting review'}>{action.label}</Button>
      </td>
    </tr>
  );
}

function ListView({ store }) {
  const cmp = taskComparator(store.sort);
  const tasks = store.filtered.slice().sort((a, b) => {
    const order = { open: 0, in_progress: 1, pending_approval: 2, completed: 3 };
    if (order[a.status] !== order[b.status]) return order[a.status] - order[b.status];
    return cmp(a, b);
  });
  return (
    <div className="tf-listwrap">
      <table className="tf-list">
        <thead><tr><th>Task</th><th>Status</th><th>Due</th><th>Owner</th><th></th></tr></thead>
        <tbody>
          {tasks.map(t => <ListRow key={t.id} task={t} store={store} />)}
          {tasks.length === 0 && <tr><td colSpan="5" className="tf-list-empty">No tasks match your filters.</td></tr>}
        </tbody>
      </table>
    </div>
  );
}

// ---------- working-on-now: sort by due date or manual drag-reorder ----------
function WorkingNowSection({ store, items, meId }) {
  const me = store.me;
  const modeKey = 'tf-worknow-mode-' + meId;
  const orderKey = 'tf-worknow-order-' + meId;
  const read = (k, fb) => { try { const v = localStorage.getItem(k); return v == null ? fb : v; } catch (e) { return fb; } };
  // source of truth: the user's saved profile pref (syncs across devices); localStorage is an offline fallback
  const [mode, setMode] = useState(() => me.worknowMode || read(modeKey, 'due'));
  const [order, setOrder] = useState(() => {
    if (Array.isArray(me.worknowOrder)) return me.worknowOrder;
    try { return JSON.parse(read(orderKey, '[]')); } catch (e) { return []; }
  });
  const [dragId, setDragId] = useState(null);
  const [overId, setOverId] = useState(null);
  // live order shown mid-drag (so cards shuffle under the finger before we persist)
  const [liveIds, setLiveIds] = useState(null);
  const [ghost, setGhost] = useState(null); // {x,y} pointer position of the lifted card
  // refs mirror state so pointer handlers never read a stale closure between renders
  const dragRef = useRef(null);
  const liveRef = useRef(null);
  const grabRef = useRef({ dx: 0, dy: 0, w: 0, h: 0 }); // where you grabbed + card size
  const gridRef = useRef(null);

  const dueSorted = items.slice().sort((a, b) => dueVal(a) - dueVal(b));
  let display = dueSorted;
  if (mode === 'manual') {
    const ranking = liveIds || order;
    const pos = new Map(ranking.map((id, i) => [id, i]));
    display = items.slice().sort((a, b) => {
      const pa = pos.has(a.id) ? pos.get(a.id) : Infinity;
      const pb = pos.has(b.id) ? pos.get(b.id) : Infinity;
      if (pa !== pb) return pa - pb;
      return dueVal(a) - dueVal(b);
    });
  }

  const saveOrder = (ids) => {
    setOrder(ids);
    try { localStorage.setItem(orderKey, JSON.stringify(ids)); } catch (e) {}
    store.savePrefs({ worknowOrder: ids, worknowMode: 'manual' });
  };
  const pickMode = (m) => {
    setMode(m); try { localStorage.setItem(modeKey, m); } catch (e) {}
    let ids = order;
    if (m === 'manual' && order.length === 0) {
      ids = dueSorted.map(t => t.id); setOrder(ids);
      try { localStorage.setItem(orderKey, JSON.stringify(ids)); } catch (e) {}
    }
    store.savePrefs({ worknowMode: m, worknowOrder: ids });
  };

  // pointer-based reorder via WINDOW listeners — robust to React reordering the DOM
  // mid-drag (which silently drops setPointerCapture). Works for mouse AND touch.
  const cardUnder = (x, y) => {
    const el = document.elementFromPoint(x, y);
    const card = el && el.closest('.tf-drag');
    return card ? card.getAttribute('data-id') : null;
  };
  const reorderTo = (targetId) => {
    if (!dragRef.current || !targetId || targetId === dragRef.current) return;
    const cur = (liveRef.current || display.map(t => t.id)).slice();
    const from = cur.indexOf(dragRef.current), to = cur.indexOf(targetId);
    if (from > -1 && to > -1 && from !== to) {
      cur.splice(from, 1); cur.splice(to, 0, dragRef.current);
      liveRef.current = cur; setLiveIds(cur);
    }
    setOverId(targetId);
  };
  const startDrag = (id, e) => {
    e.preventDefault();
    const cardEl = e.currentTarget.closest('.tf-drag');
    const rect = cardEl.getBoundingClientRect();
    grabRef.current = { dx: e.clientX - rect.left, dy: e.clientY - rect.top, w: rect.width, h: rect.height };
    dragRef.current = id;
    liveRef.current = display.map(t => t.id);
    setDragId(id);
    setLiveIds(liveRef.current);
    setGhost({ x: e.clientX, y: e.clientY });
    document.body.classList.add('tf-noselect');
    const onMove = (ev) => {
      if (ev.cancelable) ev.preventDefault();
      setGhost({ x: ev.clientX, y: ev.clientY });
      reorderTo(cardUnder(ev.clientX, ev.clientY));
    };
    const onUp = () => {
      if (liveRef.current) saveOrder(liveRef.current);
      window.removeEventListener('pointermove', onMove);
      window.removeEventListener('pointerup', onUp);
      window.removeEventListener('pointercancel', onUp);
      document.body.classList.remove('tf-noselect');
      dragRef.current = null; liveRef.current = null;
      setDragId(null); setOverId(null); setLiveIds(null); setGhost(null);
    };
    window.addEventListener('pointermove', onMove, { passive: false });
    window.addEventListener('pointerup', onUp);
    window.addEventListener('pointercancel', onUp);
  };

  return (
    <div className="tf-my-section">
      <div className="tf-worknow-head">
        <h2>Working on now<span className="tf-col-count">{items.length}</span></h2>
        {items.length > 1 && (
          <div className="tf-seg">
            <button className={mode === 'due' ? 'on' : ''} onClick={() => pickMode('due')}><Icon name="clock" size={13} stroke={2} />Due date</button>
            <button className={mode === 'manual' ? 'on' : ''} onClick={() => pickMode('manual')}><Icon name="grip" size={14} stroke={2} />Manual</button>
          </div>
        )}
      </div>
      {items.length ? (
        <div className="tf-my-grid" ref={gridRef}>
          {display.map(t => mode === 'manual' ? (
            <div key={t.id} data-id={t.id}
              className={'tf-drag' + (dragId === t.id ? ' placeholder' : '')}
              style={dragId === t.id ? { minHeight: grabRef.current.h + 'px' } : undefined}>
              {dragId === t.id ? (
                <span className="tf-drop-hint">Drop here</span>
              ) : (
                <React.Fragment>
                  <button className="tf-drag-handle" title="Drag to reorder" aria-label="Drag to reorder"
                    onPointerDown={(e) => startDrag(t.id, e)}>
                    <Icon name="grip" size={16} stroke={2} />
                  </button>
                  <TaskCard task={t} store={store} />
                </React.Fragment>
              )}
            </div>
          ) : <TaskCard key={t.id} task={t} store={store} />)}
        </div>
      ) : <p className="tf-my-empty">You haven’t claimed anything yet — grab a task from the board.</p>}
      {ghost && dragId && (() => {
        const dt = items.find(t => t.id === dragId);
        if (!dt) return null;
        return (
          <div className="tf-drag-ghost"
            style={{ width: grabRef.current.w + 'px', transform: 'translate(' + (ghost.x - grabRef.current.dx) + 'px,' + (ghost.y - grabRef.current.dy) + 'px)' }}>
            <TaskCard task={dt} store={store} />
          </div>
        );
      })()}
    </div>
  );
}

// ---------- my tasks ----------
function MyTasksView({ store }) {
  const me = store.me;
  const mine = store.tasks.filter(t => t.claimedBy === me.id || t.completedBy === me.id);
  const active = mine.filter(t => t.status === 'in_progress');
  const review = mine.filter(t => t.status === 'pending_approval');
  const done = mine.filter(t => t.status === 'completed');
  const dueToday = active.filter(t => dueLabel(t.due).state !== 'ok');
  const assigned = store.tasks.filter(t => t.assignedTo === me.id && t.status === 'open');

  const Section = ({ title, items, empty }) => (
    <div className="tf-my-section">
      <h2>{title}<span className="tf-col-count">{items.length}</span></h2>
      {items.length ? (
        <div className="tf-my-grid">{items.map(t => <TaskCard key={t.id} task={t} store={store} />)}</div>
      ) : <p className="tf-my-empty">{empty}</p>}
    </div>
  );

  return (
    <div className="tf-my">
      <PersonalTasks store={store} />
      <div className="tf-my-stats">
        <Stat n={active.length} label="In progress" tone="progress" />
        <Stat n={assigned.length} label="Assigned to you" tone="open" />
        <Stat n={dueToday.length} label="Due soon / overdue" tone="overdue" />
        <Stat n={review.length} label="Awaiting review" tone="review" />
        <Stat n={done.length} label="Completed" tone="done" />
      </div>
      {assigned.length > 0 && <Section title="Assigned to you — not started" items={assigned} empty="" />}
      <WorkingNowSection store={store} items={active} meId={me.id} />
      {review.length > 0 && <Section title="Submitted, awaiting review" items={review} empty="" />}
      <Section title="Your completed work" items={done} empty="Completed tasks you finish will be logged here." />
    </div>
  );
}

function Stat({ n, label, tone }) {
  return (
    <div className={'tf-stat ' + (tone || '')}>
      <div className="tf-stat-n">{n}</div>
      <div className="tf-stat-l">{label}</div>
    </div>
  );
}

// ---------- manager overview ----------
function ManagerView({ store }) {
  const tasks = store.tasks;
  const open = tasks.filter(t => t.status === 'open');
  const wip = tasks.filter(t => t.status === 'in_progress');
  const review = tasks.filter(t => t.status === 'pending_approval');
  const overdue = tasks.filter(t => dueLabel(t.due).state === 'overdue' && t.status !== 'completed');
  const doneToday = tasks.filter(t => t.status === 'completed');

  // leaderboard: completions per user
  const board = window.TASKFLOW_DATA.USERS.map(u => ({
    u, claimed: tasks.filter(t => t.claimedBy === u.id).length,
    done: tasks.filter(t => t.completedBy === u.id).length,
  })).filter(x => x.claimed || x.done).sort((a, b) => b.done - a.done || b.claimed - a.claimed);

  // recent activity across all tasks
  const feed = [];
  tasks.forEach(t => t.activity.forEach(a => feed.push({ ...a, task: t })));
  feed.sort((a, b) => new Date(b.at) - new Date(a.at));

  const total = tasks.length;
  const completionRate = total ? Math.round(doneToday.length / total * 100) : 0;
  const dist = [
    { k: 'open', label: 'Open', n: open.length, cls: 'open' },
    { k: 'wip', label: 'In progress', n: wip.length, cls: 'progress' },
    { k: 'review', label: 'Needs review', n: review.length, cls: 'review' },
    { k: 'done', label: 'Completed', n: doneToday.length, cls: 'done' },
  ];
  const maxDone = Math.max(1, ...board.map(b => b.done));

  return (
    <div className="tf-mgr">
      <div className="tf-mgr-bar">
        <Button size="sm" variant="default" icon="download" onClick={() => exportCSV(tasks)}>Export CSV</Button>
      </div>
      <div className="tf-mgr-stats">
        <Stat n={open.length} label="Open & unclaimed" tone="open" />
        <Stat n={wip.length} label="In progress" tone="progress" />
        <Stat n={overdue.length} label="Overdue" tone="overdue" />
        <Stat n={review.length} label="Waiting on you" tone="review" />
        <Stat n={doneToday.length} label="Completed" tone="done" />
      </div>

      <div className="tf-mgr-grid">
        <div className="tf-panel tf-panel-wide tf-analytics">
          <h2><Icon name="chart" size={16} stroke={2} />This workspace at a glance</h2>
          <div className="tf-analytics-row">
            <div className="tf-donut-wrap">
              <div className="tf-donut" style={{ background: `conic-gradient(var(--done) 0 ${completionRate}%, var(--border) ${completionRate}% 100%)` }}>
                <div className="tf-donut-hole"><b>{completionRate}%</b><span>done</span></div>
              </div>
            </div>
            <div className="tf-dist">
              {dist.map(d => (
                <div key={d.k} className="tf-dist-row">
                  <span className="tf-dist-label">{d.label}</span>
                  <div className="tf-dist-track"><div className={'tf-dist-fill ' + d.cls} style={{ width: (total ? d.n / total * 100 : 0) + '%' }}></div></div>
                  <b className="tf-dist-n">{d.n}</b>
                </div>
              ))}
            </div>
          </div>
        </div>

        <div className="tf-panel tf-panel-wide">
          <h2>Completed by person</h2>
          {board.filter(b => b.done).length === 0 ? (
            <p className="tf-my-empty">No completed work yet.</p>
          ) : (
            <div className="tf-bars">
              {board.filter(b => b.done).map(({ u, done }) => (
                <div key={u.id} className="tf-bar-row">
                  <div className="tf-bar-who"><Avatar user={u} size={24} /><span>{u.name.split(' ')[0]}</span></div>
                  <div className="tf-bar-track"><div className="tf-bar-fill" style={{ width: (done / maxDone * 100) + '%' }}></div></div>
                  <b className="tf-bar-n">{done}</b>
                </div>
              ))}
            </div>
          )}
        </div>

        <div className="tf-panel">
          <h2>Waiting for your approval</h2>
          {review.length ? review.map(t => {
            const doer = userById(t.completedBy);
            return (
              <div key={t.id} className="tf-approve-row" onClick={() => store.openDetail(t.id)}>
                <Avatar user={doer} size={32} />
                <div className="tf-approve-main">
                  <div className="tf-approve-title">{t.title}</div>
                  <div className="tf-approve-sub">{doer.name.split(' ')[0]} submitted {relTime(t.completedAt)}</div>
                </div>
                <div className="tf-approve-acts" onClick={e => e.stopPropagation()}>
                  {store.me.role === 'manager' ? (
                    <>
                      <Button size="sm" variant="ghost" icon="undo" onClick={() => store.reject(t.id)}>Send back</Button>
                      <Button size="sm" variant="primary" icon="check" onClick={() => store.approve(t.id)}>Approve</Button>
                    </>
                  ) : (
                    <span className="tf-await-pill"><Icon name="clock" size={13} stroke={2} />Awaiting manager</span>
                  )}
                </div>
              </div>
            );
          }) : <p className="tf-my-empty">Nothing waiting — you’re all caught up. 🎉</p>}
        </div>

        <div className="tf-panel">
          <h2>Who’s doing what</h2>
          <div className="tf-leaders">
            {board.map(({ u, claimed, done }) => (
              <div key={u.id} className="tf-leader">
                <Avatar user={u} size={32} />
                <div className="tf-leader-main">
                  <div className="tf-leader-name">{u.name}<span className="tf-leader-title">{u.title}</span></div>
                  <div className="tf-leader-bars">
                    <span className="tf-leader-stat"><b>{claimed}</b> active</span>
                    <span className="tf-leader-stat"><b>{done}</b> completed</span>
                  </div>
                </div>
              </div>
            ))}
          </div>
        </div>

        <div className="tf-panel tf-panel-wide">
          <h2>Recent activity</h2>
          <div className="tf-feed">
            {feed.slice(0, 14).map((a, i) => (
              <div key={i} className="tf-feed-row" onClick={() => store.openDetail(a.task.id)}>
                <Avatar user={userById(a.by)} size={26} />
                <div className="tf-feed-text">
                  <b>{userById(a.by).name.split(' ')[0]}</b> {activityVerb(a.type)} <span className="tf-feed-task">{a.task.title}</span>
                </div>
                <span className="tf-feed-time">{relTime(a.at)}</span>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

function activityVerb(type) {
  return ({
    created: 'created', claimed: 'claimed', completed: 'submitted', approved: 'approved', reopened: 'reopened', commented: 'commented on', edited: 'edited',
  })[type] || type;
}

function recurLabel(r) {
  return ({ daily: 'Repeats daily', weekly: 'Repeats weekly', monthly: 'Repeats monthly' })[r] || '';
}
window.recurLabel = recurLabel;

function exportCSV(tasks) {
  const name = (id) => { const u = userById(id); return u ? u.name : ''; };
  const fmt = (d) => d ? new Date(d).toLocaleString('en-US') : '';
  const esc = (v) => '"' + String(v == null ? '' : v).replace(/"/g, '""') + '"';
  const cols = ['Task', 'Department', 'Priority', 'Status', 'Repeats', 'Created by', 'Created', 'Due',
    'Claimed by', 'Claimed', 'Completed by', 'Completed', 'Approved by', 'Completion note'];
  const rows = tasks.map(t => [
    t.title, t.dept, t.priority, (window.STATUS_META[t.status] || {}).label || t.status, t.recurrence || '',
    name(t.createdBy), fmt(t.createdAt), fmt(t.due),
    name(t.claimedBy), fmt(t.claimedAt), name(t.completedBy), fmt(t.completedAt),
    name(t.approvedBy), t.completionNote || '',
  ]);
  const csv = [cols, ...rows].map(r => r.map(esc).join(',')).join('\r\n');
  const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'taskflow-activity-' + new Date().toISOString().slice(0, 10) + '.csv';
  document.body.appendChild(a); a.click();
  setTimeout(() => { URL.revokeObjectURL(a.href); a.remove(); }, 100);
}
window.exportCSV = exportCSV;

Object.assign(window, {
  TaskCard, BoardView, ListView, MyTasksView, ManagerView, Stat, taskAction, taskComparator, WorkingNowSection, activityVerb,
});

</script>
<script type="text/babel">
/* ============================================================
   TaskFlow — Projects: grid of project cards, per-project board,
   and the create/edit project modal (managers only).
   Requires React + ui.jsx + views.jsx (TaskCard) globals.
   ============================================================ */

const PROJECT_COLORS = ['#D9824F', '#5B8DEF', '#3FA779', '#B06AB3', '#E0A33E', '#D96A6A', '#5FB0A6', '#C9655A'];
const genPhaseId = () => 'ph_' + Math.random().toString(36).slice(2, 8);
const defaultPhases = () => (window.TASKFLOW_DATA.DEFAULT_PHASES || []).map(p => ({ ...p }));

// tasks + rollups for one phase of a project
function phaseStat(tasks, projectId, phaseId) {
  const mine = tasks.filter(t => t.projectId === projectId && t.phaseId === phaseId);
  const done = mine.filter(t => t.status === 'completed');
  return { total: mine.length, done: done.length, pct: mine.length ? Math.round(done.length / mine.length * 100) : 0 };
}
// the first phase (in order) that has tasks but isn't fully done = where the project "is"
function currentPhase(project, tasks) {
  const phases = project.phases || [];
  for (let i = 0; i < phases.length; i++) {
    const st = phaseStat(tasks, project.id, phases[i].id);
    if (st.total > 0 && st.done < st.total) return { phase: phases[i], index: i };
  }
  return null;
}

// tasks belonging to a project + derived rollups
function projectStats(project, tasks) {
  const mine = tasks.filter(t => t.projectId === project.id);
  const done = mine.filter(t => t.status === 'completed');
  const open = mine.filter(t => t.status === 'open');
  const active = mine.filter(t => t.status === 'in_progress' || t.status === 'pending_approval');
  const overdue = mine.filter(t => t.status !== 'completed' && dueLabel(t.due).state === 'overdue');
  const pct = mine.length ? Math.round(done.length / mine.length * 100) : 0;
  const people = [];
  mine.forEach(t => [t.claimedBy, t.completedBy, t.assignedTo].forEach(uid => {
    if (uid && !people.includes(uid)) people.push(uid);
  }));
  return { tasks: mine, total: mine.length, done, open, active, overdue, pct, people };
}

// ---------- project card ----------
function ProjectCard({ project, store }) {
  const s = projectStats(project, store.tasks);
  const due = project.due ? dueLabel(project.due) : null;
  const color = project.color || PROJECT_COLORS[0];
  const phases = project.phases || [];
  const cur = phases.length ? currentPhase(project, store.tasks) : null;
  const allDone = phases.length && s.total > 0 && s.done.length === s.total;
  return (
    <button className="tf-proj-card" onClick={() => store.openProject(project.id)}
      style={{ '--proj': color }}>
      <span className="tf-proj-stripe"></span>
