<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TaskFlow — Brightside Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
:root{
  --primary:#D9824F; --primary-soft:#fbf1e9; --primary-deep:#8a4a26;
  --bg:#f6f3ee; --surface:#ffffff; --surface-2:#fbf9f5;
  --border:#ece6dd; --border-2:#e1d9cd;
  --ink:#2b2722; --ink-2:#6f675c; --ink-3:#a59c8e;
  --open:#5B8DEF; --open-soft:#eaf1fd;
  --progress:#E0A33E; --progress-soft:#fbf1df;
  --review:#A56BC4; --review-soft:#f4ecf7;
  --done:#3FA779; --done-soft:#e7f4ee;
  --overdue:#D9594B; --overdue-soft:#fbeae7;
  --shadow-sm:0 1px 2px rgba(60,45,30,.05), 0 1px 1px rgba(60,45,30,.04);
  --shadow-md:0 4px 16px rgba(60,45,30,.08), 0 1px 3px rgba(60,45,30,.05);
  --shadow-lg:0 18px 50px rgba(50,38,25,.18), 0 4px 14px rgba(50,38,25,.10);
  --r-sm:8px; --r:11px; --r-lg:16px;
  --card-pad:15px; --card-gap:11px; --col-gap:16px; --fs:15px;
}
:root[data-density="compact"]{ --card-pad:12px; --card-gap:8px; --col-gap:12px; --fs:14px; }
:root[data-density="comfy"]{ --card-pad:18px; --card-gap:14px; --col-gap:20px; --fs:15.5px; }

*{box-sizing:border-box;}
html,body{margin:0;height:100%;}
body{
  font-family:'Plus Jakarta Sans',system-ui,sans-serif;
  background:var(--bg); color:var(--ink);
  font-size:var(--fs); line-height:1.45; -webkit-font-smoothing:antialiased;
}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
input,textarea,select{font-family:inherit;font-size:inherit;color:inherit;}
h1,h2,h3{margin:0;}
::selection{background:var(--primary-soft);}
#root{height:100%;}
.tf-app{height:100%;display:flex;flex-direction:column;overflow:hidden;}

/* ---------- avatar / badges ---------- */
.tf-avatar{border-radius:50%;display:flex;align-items:center;justify-content:center;
  color:#fff;font-weight:700;letter-spacing:.02em;flex:none;line-height:1;}
.tf-stack{display:flex;align-items:center;}
.tf-badge.status{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;
  padding:3px 9px 3px 7px;border-radius:99px;line-height:1;}
.tf-badge.status .dot{width:6px;height:6px;border-radius:50%;}
.status.open{background:var(--open-soft);color:#2f5bb0;} .status.open .dot{background:var(--open);}
.status.progress{background:var(--progress-soft);color:#9a6b18;} .status.progress .dot{background:var(--progress);}
.status.review{background:var(--review-soft);color:#7a429b;} .status.review .dot{background:var(--review);}
.status.done{background:var(--done-soft);color:#25794f;} .status.done .dot{background:var(--done);}
.tf-prio{display:inline-flex;align-items:center;gap:4px;font-size:11.5px;font-weight:600;}
.tf-prio.urgent{color:var(--overdue);} .tf-prio.high{color:#c47a1e;}
.tf-prio.medium{color:var(--ink-2);} .tf-prio.low{color:var(--ink-3);}
.tf-dept{font-size:11.5px;font-weight:600;color:var(--ink-2);background:var(--surface-2);
  border:1px solid var(--border);padding:2px 8px;border-radius:99px;}
.tf-proof,.tf-est{display:inline-flex;align-items:center;gap:4px;font-size:11.5px;font-weight:600;color:var(--ink-3);}

/* ---------- buttons ---------- */
.tf-btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;font-weight:600;
  border-radius:var(--r-sm);transition:.15s;white-space:nowrap;border:1px solid transparent;}
.tf-btn.md{padding:9px 15px;font-size:13.5px;}
.tf-btn.sm{padding:6.5px 11px;font-size:12.5px;}
.tf-btn.full{width:100%;}
.tf-btn.primary{background:var(--primary);color:#fff;box-shadow:var(--shadow-sm);}
.tf-btn.danger{background:var(--overdue);color:#fff;box-shadow:var(--shadow-sm);}
.tf-btn.danger:hover{filter:brightness(1.05);box-shadow:var(--shadow-md);}
.tf-btn.primary:hover{filter:brightness(1.05);box-shadow:var(--shadow-md);}
.tf-btn.default{background:var(--surface);border-color:var(--border-2);color:var(--ink);}
.tf-btn.default:hover{background:var(--surface-2);}
.tf-btn.ghost{background:transparent;color:var(--ink-2);border-color:var(--border-2);}
.tf-btn.ghost:hover{background:var(--surface-2);color:var(--ink);}
.tf-btn:disabled{opacity:.45;cursor:not-allowed;box-shadow:none;filter:none;}

.tf-icon-btn{display:flex;align-items:center;justify-content:center;width:34px;height:34px;border-radius:var(--r-sm);
  color:var(--ink-2);transition:.15s;position:relative;}
.tf-icon-btn:hover{background:var(--surface-2);color:var(--ink);}
.tf-icon-btn.danger:hover{background:var(--overdue-soft);color:var(--overdue);}
.tf-icon-btn.lg{width:38px;height:38px;}

/* ---------- top bar ---------- */
.tf-top{display:flex;align-items:center;gap:18px;padding:0 20px;height:62px;flex:none;
  background:var(--surface);border-bottom:1px solid var(--border);z-index:30;}
.tf-brand{display:flex;align-items:center;gap:11px;min-width:200px;}
.tf-logo{width:36px;height:36px;border-radius:10px;background:var(--primary);color:#fff;
  display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow-sm);}
.tf-brand-text{display:flex;flex-direction:column;line-height:1.15;}
.tf-brand-text b{font-size:15px;font-weight:700;}
.tf-brand-text span{font-size:11.5px;color:var(--ink-3);font-weight:500;}

.tf-nav{display:flex;align-items:center;gap:3px;background:var(--surface-2);padding:4px;border-radius:11px;
  border:1px solid var(--border);}
.tf-nav-btn{display:flex;align-items:center;gap:7px;padding:8px 14px;border-radius:8px;font-size:13.5px;
  font-weight:600;color:var(--ink-2);transition:.15s;position:relative;}
.tf-nav-btn:hover{color:var(--ink);}
.tf-nav-btn.on{background:var(--surface);color:var(--ink);box-shadow:var(--shadow-sm);}
.tf-nav-badge{background:var(--review);color:#fff;font-size:10.5px;font-weight:700;min-width:17px;height:17px;
  border-radius:99px;display:flex;align-items:center;justify-content:center;padding:0 4px;margin-left:2px;}

.tf-top-right{margin-left:auto;display:flex;align-items:center;gap:10px;}
.tf-bell-wrap,.tf-user-wrap{position:relative;}
.tf-bell-dot{position:absolute;top:3px;right:3px;background:var(--overdue);color:#fff;font-size:10px;font-weight:700;
  min-width:16px;height:16px;border-radius:99px;display:flex;align-items:center;justify-content:center;padding:0 3px;
  border:2px solid var(--surface);}
.tf-user-btn{display:flex;align-items:center;gap:9px;padding:5px 8px 5px 5px;border-radius:10px;transition:.15s;}
.tf-user-btn:hover{background:var(--surface-2);}
.tf-user-meta{display:flex;flex-direction:column;line-height:1.15;text-align:left;}
.tf-user-meta b{font-size:13px;font-weight:700;}
.tf-user-meta span{font-size:11px;color:var(--ink-3);}

/* popovers */
.tf-pop-scrim{position:fixed;inset:0;z-index:40;}
.tf-usermenu{position:absolute;top:48px;right:0;width:288px;background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r-lg);box-shadow:var(--shadow-lg);z-index:50;padding:7px;animation:pop .14s ease;}
@keyframes pop{from{opacity:0;transform:translateY(-6px) scale(.98);}to{opacity:1;transform:none;}}
.tf-usermenu-head{padding:10px 11px 9px;font-size:12.5px;font-weight:700;color:var(--ink);display:flex;flex-direction:column;gap:2px;}
.tf-usermenu-head span{font-size:11px;font-weight:500;color:var(--ink-3);}
.tf-usermenu-row{display:flex;align-items:center;gap:10px;width:100%;padding:8px 10px;border-radius:10px;text-align:left;transition:.12s;}
.tf-usermenu-row:hover{background:var(--surface-2);}
.tf-usermenu-row.on{background:var(--primary-soft);}
.tf-usermenu-row .tf-usermenu-info{flex:1;display:flex;flex-direction:column;line-height:1.2;}
.tf-usermenu-info b{font-size:13px;font-weight:600;}
.tf-usermenu-info span{font-size:11px;color:var(--ink-3);}
.tf-usermenu-row.on svg{color:var(--primary);}

/* ---------- sub bar ---------- */
.tf-subbar{display:flex;align-items:center;gap:12px;padding:11px 24px;flex:none;
  background:var(--surface);border-bottom:1px solid var(--border);z-index:20;}
.tf-search{display:flex;align-items:center;gap:8px;background:var(--surface-2);border:1px solid var(--border);
  border-radius:9px;padding:0 11px;height:36px;width:280px;color:var(--ink-3);}
.tf-search input{border:none;background:none;outline:none;width:100%;font-size:13.5px;color:var(--ink);}
.tf-subbar-right{margin-left:auto;display:flex;align-items:center;gap:9px;}
.tf-select{position:relative;display:flex;align-items:center;}
.tf-select select{appearance:none;background:var(--surface);border:1px solid var(--border-2);border-radius:9px;
  padding:8px 32px 8px 12px;font-size:13px;font-weight:600;color:var(--ink);cursor:pointer;outline:none;}
.tf-select svg{position:absolute;right:10px;pointer-events:none;color:var(--ink-3);}
.tf-select.sm select{padding:7px 30px 7px 11px;font-size:12.5px;}
.tf-chip{display:flex;align-items:center;gap:6px;padding:8px 12px;border-radius:9px;font-size:12.5px;font-weight:600;
  color:var(--ink-2);background:var(--surface);border:1px solid var(--border-2);transition:.15s;}
.tf-chip:hover{background:var(--surface-2);}
.tf-chip.on{background:var(--primary-soft);color:var(--primary-deep);border-color:transparent;}
.tf-layout-toggle{display:flex;background:var(--surface-2);border:1px solid var(--border);border-radius:9px;padding:3px;gap:2px;}
.tf-layout-toggle button{width:32px;height:30px;border-radius:6px;display:flex;align-items:center;justify-content:center;color:var(--ink-3);}
.tf-layout-toggle button.on{background:var(--surface);color:var(--ink);box-shadow:var(--shadow-sm);}

/* ---------- main / view header ---------- */
.tf-main{flex:1;overflow:hidden;display:flex;flex-direction:column;}
.tf-main.view-mine,.tf-main.view-manager,.tf-main.view-team{overflow-y:auto;}
.tf-main.view-chat{overflow:hidden;}
.tf-viewhead{padding:22px 24px 16px;flex:none;}
.tf-viewhead h1{font-size:24px;font-weight:800;letter-spacing:-.02em;}
.tf-viewhead p{margin:4px 0 0;color:var(--ink-2);font-size:13.5px;max-width:620px;}

/* ---------- board ---------- */
.tf-board{flex:1;display:grid;grid-template-columns:repeat(4,1fr);gap:var(--col-gap);
  padding:0 24px 24px;overflow:hidden;min-height:0;}
.tf-col{display:flex;flex-direction:column;min-height:0;background:var(--surface-2);
  border:1px solid var(--border);border-radius:var(--r-lg);}
.tf-col-head{display:flex;align-items:flex-start;justify-content:space-between;padding:14px 14px 11px;flex:none;}
.tf-col-head h2{font-size:14px;font-weight:700;display:flex;align-items:center;gap:8px;}
.tf-col-head p{margin:2px 0 0;font-size:11.5px;color:var(--ink-3);}
.tf-col-count{font-size:11.5px;font-weight:700;color:var(--ink-2);background:var(--surface);border:1px solid var(--border);
  min-width:20px;height:20px;border-radius:99px;display:inline-flex;align-items:center;justify-content:center;padding:0 5px;}
.tf-col.open .tf-col-head h2::before,.tf-col.in_progress .tf-col-head h2::before,
.tf-col.pending_approval .tf-col-head h2::before,.tf-col.completed .tf-col-head h2::before{
  content:'';width:8px;height:8px;border-radius:50%;}
.tf-col.open .tf-col-head h2::before{background:var(--open);}
.tf-col.in_progress .tf-col-head h2::before{background:var(--progress);}
.tf-col.pending_approval .tf-col-head h2::before{background:var(--review);}
.tf-col.completed .tf-col-head h2::before{background:var(--done);}
.tf-col-add{width:26px;height:26px;border-radius:7px;background:var(--surface);border:1px solid var(--border-2);
  display:flex;align-items:center;justify-content:center;color:var(--ink-2);transition:.15s;}
.tf-col-add:hover{background:var(--primary);color:#fff;border-color:transparent;}
.tf-col-body{flex:1;overflow-y:auto;padding:0 10px 12px;display:flex;flex-direction:column;gap:var(--card-gap);}
.tf-col-empty{font-size:12.5px;color:var(--ink-3);text-align:center;padding:24px 0;font-weight:500;}

/* card */
.tf-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:var(--card-pad);
  display:flex;flex-direction:column;gap:9px;cursor:pointer;transition:.16s;box-shadow:var(--shadow-sm);}
.tf-card:hover{border-color:var(--border-2);box-shadow:var(--shadow-md);transform:translateY(-1px);}
.tf-card.is-overdue{border-left:3px solid var(--overdue);}
.tf-card-top{display:flex;align-items:center;gap:9px;}
.tf-card-title{font-size:14.5px;font-weight:700;line-height:1.3;letter-spacing:-.01em;text-wrap:pretty;}
.tf-card-desc{margin:-2px 0 0;font-size:12.5px;color:var(--ink-2);line-height:1.45;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.tf-card-meta{display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.tf-due{display:inline-flex;align-items:center;gap:4px;font-size:11.5px;font-weight:600;color:var(--ink-2);}
.tf-due.overdue{color:var(--overdue);} .tf-due.soon{color:#c47a1e;}
.tf-card-foot{display:flex;align-items:center;justify-content:space-between;gap:10px;
  padding-top:10px;border-top:1px solid var(--border);}
.tf-card-who{display:flex;align-items:center;gap:7px;min-width:0;}
.tf-who-label{font-size:11.5px;color:var(--ink-2);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tf-who-label b{font-weight:700;color:var(--ink);}
.tf-who-label.muted{display:inline-flex;align-items:center;gap:5px;color:var(--ink-3);}

/* ---------- list view ---------- */
.tf-listwrap{flex:1;overflow-y:auto;padding:0 24px 24px;}
.tf-list{width:100%;border-collapse:separate;border-spacing:0;background:var(--surface);
  border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;}
.tf-list thead th{text-align:left;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;
  color:var(--ink-3);padding:12px 16px;border-bottom:1px solid var(--border);background:var(--surface-2);}
.tf-row{cursor:pointer;transition:.12s;}
.tf-row:hover{background:var(--surface-2);}
.tf-row td{padding:13px 16px;border-bottom:1px solid var(--border);vertical-align:middle;}
.tf-row:last-child td{border-bottom:none;}
.tf-row.is-overdue td.c-title{box-shadow:inset 3px 0 0 var(--overdue);}
.tf-row-title{font-size:13.5px;font-weight:700;}
.tf-row-sub{display:flex;align-items:center;gap:10px;margin-top:4px;}
.c-due{font-size:12.5px;font-weight:600;color:var(--ink-2);white-space:nowrap;}
.c-due.overdue{color:var(--overdue);} .c-due.soon{color:#c47a1e;}
.c-act{text-align:right;}
.tf-list-empty,.tf-list-empty td{text-align:center;color:var(--ink-3);padding:30px;}
.muted{color:var(--ink-3);}

/* ---------- stats ---------- */
.tf-my-stats,.tf-mgr-stats{display:grid;gap:12px;padding:0 24px 6px;}
.tf-my-stats{grid-template-columns:repeat(5,1fr);}
.tf-mgr-stats{grid-template-columns:repeat(5,1fr);}
.tf-stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:16px 18px;
  box-shadow:var(--shadow-sm);position:relative;overflow:hidden;}
.tf-stat::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--ink-3);}
.tf-stat.open::before{background:var(--open);} .tf-stat.progress::before{background:var(--progress);}
.tf-stat.overdue::before{background:var(--overdue);} .tf-stat.review::before{background:var(--review);}
.tf-stat.done::before{background:var(--done);}
.tf-stat-n{font-size:28px;font-weight:800;letter-spacing:-.02em;line-height:1;}
.tf-stat-l{font-size:12px;color:var(--ink-2);font-weight:600;margin-top:6px;}

/* ---------- my tasks ---------- */
.tf-my{padding-bottom:40px;}
.tf-personal{margin:4px 24px 8px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);
  padding:18px 20px;box-shadow:var(--shadow-sm);}
.tf-personal-head{margin-bottom:14px;}
.tf-personal-title{display:flex;align-items:center;gap:9px;}
.tf-personal-title h2{font-size:16px;font-weight:700;}
.tf-personal-title svg{color:var(--primary);}
.tf-private-tag{display:inline-flex;align-items:center;gap:5px;font-size:10.5px;font-weight:700;color:var(--ink-2);
  background:var(--surface-2);border:1px solid var(--border);padding:3px 9px;border-radius:99px;}
.tf-personal-head p{font-size:12.5px;color:var(--ink-3);margin-top:5px;line-height:1.45;}
.tf-personal-add{display:flex;gap:8px;margin-bottom:6px;}
.tf-personal-add input[type=text],.tf-personal-add input:not(.tf-personal-date){flex:1;}
.tf-personal-add input{background:var(--surface-2);border:1px solid var(--border-2);border-radius:9px;padding:9px 13px;
  outline:none;font-size:13.5px;transition:.13s;}
.tf-personal-add input:focus{border-color:var(--primary);background:var(--surface);box-shadow:0 0 0 3px var(--primary-soft);}
.tf-personal-date{flex:none;width:140px;color:var(--ink-2);}
.tf-personal-add .tf-btn{flex:none;}
.tf-personal-list{margin-top:8px;}
.tf-personal-loading{display:flex;justify-content:center;padding:18px;}
.tf-personal-empty{font-size:13px;color:var(--ink-3);padding:10px 2px;}
.tf-personal-divider{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-3);
  margin:12px 0 6px;}
.tf-personal-row{display:flex;align-items:center;gap:11px;padding:9px 6px;border-radius:9px;transition:.12s;}
.tf-personal-row:hover{background:var(--surface-2);}
.tf-personal-row.pending{opacity:.6;}
.tf-personal-text{flex:1;font-size:14px;color:var(--ink);}
.tf-personal-row.done .tf-personal-text{text-decoration:line-through;color:var(--ink-3);}
.tf-checkbox.round{width:21px;height:21px;border-radius:50%;cursor:pointer;}
.tf-personal-due{display:inline-flex;align-items:center;gap:4px;font-size:11.5px;font-weight:600;color:var(--ink-3);flex:none;}
.tf-personal-due.overdue{color:var(--overdue);} .tf-personal-due.soon{color:#c47a1e;}
.tf-personal-del{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;
  color:var(--ink-3);opacity:0;transition:.12s;flex:none;}
.tf-personal-row:hover .tf-personal-del{opacity:1;}
.tf-personal-del:hover{background:var(--overdue-soft);color:var(--overdue);}
.tf-my-section{padding:22px 24px 0;}
.tf-my-section h2{font-size:16px;font-weight:700;display:flex;align-items:center;gap:9px;margin-bottom:13px;}
.tf-my-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:13px;}
.tf-my-empty{font-size:13px;color:var(--ink-3);background:var(--surface-2);border:1px dashed var(--border-2);
  border-radius:var(--r);padding:18px;font-weight:500;}

/* ---------- manager ---------- */
.tf-mgr{padding-bottom:40px;}
.tf-mgr-grid{display:grid;grid-template-columns:1.1fr .9fr;gap:16px;padding:18px 24px 0;}
.tf-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:18px 20px;
  box-shadow:var(--shadow-sm);}
.tf-panel-wide{grid-column:1 / -1;}
.tf-panel h2{font-size:15px;font-weight:700;margin-bottom:14px;}
.tf-approve-row{display:flex;align-items:center;gap:12px;padding:11px;border-radius:var(--r);transition:.13s;cursor:pointer;}
.tf-approve-row:hover{background:var(--surface-2);}
.tf-approve-row+.tf-approve-row{margin-top:2px;}
.tf-approve-main{flex:1;min-width:0;}
.tf-approve-title{font-size:13.5px;font-weight:700;}
.tf-approve-sub{font-size:11.5px;color:var(--ink-3);margin-top:2px;}
.tf-approve-acts{display:flex;align-items:center;gap:7px;}
.tf-await-pill{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:600;color:var(--review);
  background:var(--review-soft);padding:5px 10px;border-radius:99px;}
.tf-leaders{display:flex;flex-direction:column;gap:3px;}
.tf-leader{display:flex;align-items:center;gap:12px;padding:9px 8px;border-radius:var(--r);}
.tf-leader:hover{background:var(--surface-2);}
.tf-leader-main{flex:1;}
.tf-leader-name{font-size:13.5px;font-weight:700;display:flex;align-items:center;gap:8px;}
.tf-leader-title{font-size:11px;font-weight:500;color:var(--ink-3);}
.tf-leader-bars{display:flex;gap:14px;margin-top:3px;}
.tf-leader-stat{font-size:11.5px;color:var(--ink-2);}
.tf-leader-stat b{font-weight:700;color:var(--ink);}
.tf-feed{display:flex;flex-direction:column;}
.tf-feed-row{display:flex;align-items:center;gap:11px;padding:9px 8px;border-radius:var(--r);cursor:pointer;transition:.12s;}
.tf-feed-row:hover{background:var(--surface-2);}
.tf-feed-text{flex:1;font-size:12.5px;color:var(--ink-2);}
.tf-feed-text b{color:var(--ink);font-weight:700;}
.tf-feed-task{color:var(--ink);font-weight:600;}
.tf-feed-time{font-size:11px;color:var(--ink-3);white-space:nowrap;}

/* ---------- modal ---------- */
.tf-overlay{position:fixed;inset:0;background:rgba(40,30,20,.32);backdrop-filter:blur(3px);z-index:60;
  display:flex;align-items:center;justify-content:center;padding:24px;animation:fade .15s ease;}
@keyframes fade{from{opacity:0;}to{opacity:1;}}
.tf-modal{background:var(--surface);border-radius:var(--r-lg);box-shadow:var(--shadow-lg);width:480px;max-width:100%;
  max-height:90vh;display:flex;flex-direction:column;animation:rise .18s ease;}
.tf-modal.wide{width:620px;}
@keyframes rise{from{opacity:0;transform:translateY(14px) scale(.98);}to{opacity:1;transform:none;}}
.tf-modal-head{display:flex;align-items:flex-start;justify-content:space-between;padding:20px 22px 16px;
  border-bottom:1px solid var(--border);}
.tf-modal-kicker{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--primary);margin-bottom:5px;}
.tf-modal-head h2{font-size:18px;font-weight:700;letter-spacing:-.01em;text-wrap:pretty;}
.tf-form{padding:18px 22px;display:grid;grid-template-columns:1fr 1fr;gap:14px;overflow-y:auto;}
.tf-field{display:flex;flex-direction:column;gap:6px;}
.tf-field.full{grid-column:1 / -1;}
.tf-field>span{font-size:12px;font-weight:700;color:var(--ink-2);}
.tf-field input,.tf-field textarea,.tf-field select{background:var(--surface-2);border:1px solid var(--border-2);
  border-radius:9px;padding:10px 12px;outline:none;transition:.13s;width:100%;}
.tf-field textarea{resize:vertical;line-height:1.5;}
.tf-field input:focus,.tf-field textarea:focus,.tf-field select:focus{border-color:var(--primary);background:var(--surface);
  box-shadow:0 0 0 3px var(--primary-soft);}
.tf-field .tf-select select{width:100%;}
.tf-prio-pick{display:flex;gap:6px;}
.tf-prio-opt{flex:1;padding:9px 4px;border-radius:8px;font-size:12px;font-weight:600;color:var(--ink-2);
  background:var(--surface-2);border:1px solid var(--border-2);transition:.13s;}
.tf-prio-opt:hover{border-color:var(--ink-3);}
.tf-prio-opt.on{color:#fff;border-color:transparent;}
.tf-prio-opt.low.on{background:var(--ink-3);} .tf-prio-opt.medium.on{background:var(--progress);}
.tf-prio-opt.high.on{background:#c47a1e;} .tf-prio-opt.urgent.on{background:var(--overdue);}
.tf-check{display:flex;align-items:center;gap:10px;cursor:pointer;padding:4px 0;}
.tf-checkbox{width:20px;height:20px;border-radius:6px;border:1.5px solid var(--border-2);background:var(--surface-2);
  display:flex;align-items:center;justify-content:center;color:#fff;flex:none;transition:.13s;}
.tf-checkbox.on{background:var(--primary);border-color:var(--primary);}
.tf-check-text{font-size:13px;color:var(--ink-2);} .tf-check-text b{color:var(--ink);font-weight:700;}
.tf-modal-foot{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:15px 22px;
  border-top:1px solid var(--border);background:var(--surface-2);border-radius:0 0 var(--r-lg) var(--r-lg);}
.tf-foot-note{font-size:12px;color:var(--ink-3);} .tf-foot-note b{color:var(--ink-2);font-weight:700;}
.tf-foot-acts{display:flex;gap:9px;margin-left:auto;}

/* complete modal */
.tf-complete-body{padding:18px 22px;}
.tf-proof-head{display:flex;align-items:center;gap:9px;font-size:13px;font-weight:600;color:var(--ink-2);margin-bottom:10px;}
.tf-complete-proof textarea{width:100%;background:var(--surface-2);border:1px solid var(--border-2);border-radius:9px;
  padding:11px 12px;outline:none;resize:vertical;line-height:1.5;transition:.13s;}
.tf-complete-proof textarea:focus{border-color:var(--primary);background:var(--surface);box-shadow:0 0 0 3px var(--primary-soft);}
.tf-drop{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:9px;width:100%;
  padding:24px;border:1.5px dashed var(--border-2);border-radius:var(--r);background:var(--surface-2);color:var(--ink-2);
  font-size:13px;transition:.13s;position:relative;}
.tf-drop.busy{opacity:.8;}
.tf-proof-preview{position:relative;border-radius:var(--r);overflow:hidden;border:1px solid var(--border);}
.tf-proof-preview img{display:block;width:100%;max-height:240px;object-fit:cover;}
.tf-proof-clear{position:absolute;top:8px;right:8px;display:inline-flex;align-items:center;gap:5px;background:rgba(20,14,10,.62);
  color:#fff;font-size:11.5px;font-weight:600;padding:5px 10px;border-radius:8px;backdrop-filter:blur(4px);}
.tf-proof-clear.inline{position:static;background:var(--surface-2);color:var(--ink-3);padding:4px;margin-left:auto;}
.tf-drop:hover{border-color:var(--primary);color:var(--ink);}
.tf-drop.on{border-style:solid;border-color:var(--done);background:var(--done-soft);color:#25794f;}
.tf-drop b{font-weight:700;}
.tf-checkrow{display:flex;align-items:center;gap:11px;width:100%;padding:14px;border:1px solid var(--border-2);
  border-radius:var(--r);background:var(--surface-2);font-size:13.5px;font-weight:600;color:var(--ink-2);transition:.13s;text-align:left;}
.tf-checkrow.on{border-color:var(--done);background:var(--done-soft);color:#25794f;}
.tf-approve-hint{display:flex;align-items:flex-start;gap:8px;margin-top:14px;padding:11px 13px;background:var(--review-soft);
  border-radius:var(--r);font-size:12.5px;color:#7a429b;line-height:1.45;}
.tf-approve-hint svg{flex:none;margin-top:1px;} .tf-approve-hint b{font-weight:700;}

/* ---------- slide-over sheet ---------- */
.tf-sheet-overlay{position:fixed;inset:0;background:rgba(40,30,20,.32);backdrop-filter:blur(3px);z-index:60;
  display:flex;justify-content:flex-end;animation:fade .15s ease;}
.tf-sheet{width:520px;max-width:100%;height:100%;background:var(--surface);display:flex;flex-direction:column;
  box-shadow:var(--shadow-lg);animation:slide .22s cubic-bezier(.32,.72,0,1);}
@keyframes slide{from{transform:translateX(30px);opacity:.6;}to{transform:none;opacity:1;}}
.tf-sheet-head{display:flex;align-items:center;gap:12px;padding:14px 18px;border-bottom:1px solid var(--border);flex:none;}
.tf-sheet-head-tags{margin-left:auto;display:flex;align-items:center;gap:10px;}
.tf-sheet-body{flex:1;overflow-y:auto;padding:22px;}
.tf-sheet-title{font-size:22px;font-weight:800;letter-spacing:-.02em;line-height:1.22;text-wrap:pretty;}
.tf-sheet-facts{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border);border:1px solid var(--border);
  border-radius:var(--r);overflow:hidden;margin:18px 0 22px;}
.tf-fact{background:var(--surface);padding:11px 14px;display:flex;flex-direction:column;gap:3px;}
.tf-fact>span{font-size:11px;font-weight:600;color:var(--ink-3);text-transform:uppercase;letter-spacing:.04em;}
.tf-fact>b{font-size:13px;font-weight:700;}
.fact-due.overdue{color:var(--overdue);} .fact-due.soon{color:#c47a1e;}
.tf-sheet-sec{margin-bottom:24px;}
.tf-sheet-sec h3{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-3);margin-bottom:10px;}
.tf-sheet-desc{font-size:14px;color:var(--ink);line-height:1.6;margin:0;text-wrap:pretty;}
.tf-proof-card{background:var(--done-soft);border:1px solid #cce8d8;border-radius:var(--r);padding:14px;}
.tf-proof-card-head{display:flex;align-items:center;gap:8px;font-size:11.5px;color:#25794f;font-weight:600;margin-bottom:8px;}
.tf-proof-card p{margin:0;font-size:13.5px;color:var(--ink);line-height:1.5;}
.tf-proof-file{display:inline-flex;align-items:center;gap:7px;margin-top:10px;background:var(--surface);border:1px solid var(--border);
  border-radius:8px;padding:7px 11px;font-size:12.5px;font-weight:600;color:var(--ink-2);}
.tf-proof-file.muted{color:var(--ink-3);font-weight:500;}
a.tf-proof-file:hover{border-color:var(--primary);color:var(--primary);}
.tf-proof-img{display:block;margin-top:10px;border-radius:10px;overflow:hidden;border:1px solid #cce8d8;}
.tf-proof-img img{display:block;width:100%;max-height:260px;object-fit:cover;}
.tf-timeline{display:flex;flex-direction:column;gap:14px;position:relative;}
.tf-timeline::before{content:'';position:absolute;left:12.5px;top:6px;bottom:6px;width:1.5px;background:var(--border);}
.tf-tl-row{display:flex;align-items:flex-start;gap:11px;position:relative;}
.tf-tl-row .tf-avatar{box-shadow:0 0 0 3px var(--surface);}
.tf-tl-text{display:flex;flex-direction:column;gap:1px;padding-top:3px;font-size:13px;color:var(--ink-2);}
.tf-tl-text b{color:var(--ink);font-weight:700;}
.tf-tl-time{font-size:11px;color:var(--ink-3);}
.tf-empty-comment{font-size:12.5px;color:var(--ink-3);margin:0 0 12px;}
.tf-comments{display:flex;flex-direction:column;gap:12px;margin-bottom:14px;}
.tf-comment{display:flex;gap:10px;}
.tf-comment-bubble{background:var(--surface-2);border:1px solid var(--border);border-radius:4px 11px 11px 11px;padding:9px 13px;flex:1;}
.tf-comment-head{display:flex;align-items:center;gap:8px;margin-bottom:3px;}
.tf-comment-head b{font-size:12.5px;font-weight:700;} .tf-comment-head span{font-size:11px;color:var(--ink-3);}
.tf-comment-bubble p{margin:0;font-size:13px;color:var(--ink);line-height:1.45;}
.tf-comment-input{display:flex;align-items:center;gap:9px;}
.tf-comment-input input{flex:1;background:var(--surface-2);border:1px solid var(--border-2);border-radius:99px;
  padding:9px 15px;outline:none;font-size:13px;transition:.13s;}
.tf-comment-input input:focus{border-color:var(--primary);background:var(--surface);box-shadow:0 0 0 3px var(--primary-soft);}
.tf-send{width:34px;height:34px;border-radius:50%;background:var(--primary);color:#fff;display:flex;align-items:center;
  justify-content:center;flex:none;transition:.13s;}
.tf-send:disabled{opacity:.4;}
.tf-sheet-foot{padding:14px 18px;border-top:1px solid var(--border);flex:none;display:flex;align-items:center;
  justify-content:space-between;gap:14px;background:var(--surface-2);}
.tf-sheet-foot .tf-btn{flex:none;}
.tf-sheet-foot-note{font-size:12.5px;color:var(--ink-2);display:flex;align-items:center;gap:7px;}
.tf-sheet-foot-note.solo{margin:0 auto 0 0;} .tf-sheet-foot-note.done{color:#25794f;font-weight:600;}
.tf-sheet-foot .tf-foot-acts{margin-left:auto;}

/* ---------- notifications ---------- */
.tf-notif{position:absolute;top:48px;right:0;width:340px;background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r-lg);box-shadow:var(--shadow-lg);z-index:50;animation:pop .14s ease;overflow:hidden;}
.tf-notif-head{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--border);}
.tf-notif-head h3{font-size:14px;font-weight:700;}
.tf-link{font-size:12px;font-weight:600;color:var(--primary);}
.tf-notif-list{max-height:380px;overflow-y:auto;}
.tf-notif-empty{padding:30px;text-align:center;color:var(--ink-3);font-size:13px;}
.tf-notif-row{display:flex;align-items:flex-start;gap:11px;padding:12px 16px;border-bottom:1px solid var(--border);
  cursor:pointer;transition:.12s;position:relative;}
.tf-notif-row:hover{background:var(--surface-2);}
.tf-notif-row.unread{background:var(--primary-soft);}
.tf-notif-row.unread:hover{background:var(--primary-soft);filter:brightness(.98);}
.tf-notif-ic{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex:none;}
.tf-notif-ic.overdue{background:var(--overdue-soft);color:var(--overdue);}
.tf-notif-ic.review{background:var(--review-soft);color:var(--review);}
.tf-notif-ic.new{background:var(--primary-soft);color:var(--primary-deep);}
.tf-notif-ic.claim{background:var(--open-soft);color:#2f5bb0;}
.tf-notif-ic.done,.tf-notif-ic.approved{background:var(--done-soft);color:var(--done);}
.tf-notif-ic.reopened{background:var(--overdue-soft);color:var(--overdue);}
.tf-notif-ic.comment{background:var(--surface-2);color:var(--ink-2);}
.tf-notif-ic.assign{background:var(--primary-soft);color:var(--primary-deep);}
.tf-notif-text{flex:1;} .tf-notif-text p{margin:0;font-size:12.5px;line-height:1.4;color:var(--ink);}
.tf-notif-text span{font-size:11px;color:var(--ink-3);}
.tf-notif-dot{width:8px;height:8px;border-radius:50%;background:var(--primary);flex:none;margin-top:5px;}

/* ---------- toast ---------- */
.tf-toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%);z-index:80;
  background:var(--ink);color:#fff;border-radius:99px;padding:11px 20px 11px 13px;display:flex;align-items:center;gap:11px;
  box-shadow:var(--shadow-lg);font-size:13.5px;font-weight:600;animation:toast .3s cubic-bezier(.32,.72,0,1);}
@keyframes toast{from{opacity:0;transform:translate(-50%,16px);}to{opacity:1;transform:translate(-50%,0);}}
.tf-toast-ic{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex:none;color:#fff;}
.tf-toast-ic.done{background:var(--done);} .tf-toast-ic.review{background:var(--review);} .tf-toast-ic.open{background:var(--open);}

/* ---------- auth / login ---------- */
.tf-auth{height:100%;display:grid;grid-template-columns:1.05fr .95fr;overflow:hidden;}
.tf-auth-art{position:relative;overflow:hidden;background:
  linear-gradient(150deg,var(--primary-deep),var(--primary) 55%,#e8a06f);}
.tf-auth-art-inner{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;padding:56px;}
.tf-auth-art-glow{position:absolute;width:520px;height:520px;border-radius:50%;
  background:radial-gradient(circle,rgba(255,255,255,.28),transparent 62%);top:-120px;right:-120px;}
.tf-auth-quote{position:relative;color:#fff;max-width:420px;}
.tf-auth-logo{width:54px;height:54px;border-radius:15px;background:rgba(255,255,255,.18);
  border:1px solid rgba(255,255,255,.3);display:flex;align-items:center;justify-content:center;margin-bottom:26px;
  backdrop-filter:blur(4px);}
.tf-auth-quote h2{font-size:34px;font-weight:800;letter-spacing:-.025em;line-height:1.12;text-wrap:balance;}
.tf-auth-quote p{font-size:16px;line-height:1.55;color:rgba(255,255,255,.86);margin:16px 0 0;max-width:380px;}
.tf-auth-mini{display:flex;gap:20px;margin-top:34px;}
.tf-auth-mini-col{display:flex;align-items:center;gap:8px;font-size:13.5px;font-weight:600;color:rgba(255,255,255,.92);}
.tf-auth-mini-dot{width:9px;height:9px;border-radius:50%;}
.tf-auth-mini-dot.open{background:#bcd3fb;} .tf-auth-mini-dot.progress{background:#f4d59a;} .tf-auth-mini-dot.done{background:#aee3c8;}

.tf-auth-panel{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;
  position:relative;background:var(--bg);}
.tf-auth-card{width:100%;max-width:380px;}
.tf-auth-brand{display:flex;align-items:center;gap:11px;margin-bottom:30px;}
.tf-auth-brand b{font-size:17px;font-weight:700;}
.tf-auth-card h1{font-size:27px;font-weight:800;letter-spacing:-.02em;}
.tf-auth-sub{margin:8px 0 26px;color:var(--ink-2);font-size:14px;line-height:1.5;}
.tf-auth-sub b{color:var(--ink);font-weight:700;}
.tf-auth-label{font-size:12.5px;font-weight:700;color:var(--ink-2);display:block;margin-bottom:7px;}
.tf-auth-input{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--border-2);
  border-radius:11px;padding:0 14px;height:48px;color:var(--ink-3);transition:.14s;}
.tf-auth-input:focus-within{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-soft);color:var(--primary);}
.tf-auth-input input{flex:1;border:none;background:none;outline:none;font-size:15px;color:var(--ink);height:100%;}
.tf-auth-btn{height:48px;margin-top:16px;font-size:14.5px;border-radius:11px;}
.tf-auth-btn.loading{opacity:.85;}
.tf-spinner{width:16px;height:16px;border-radius:50%;border:2px solid rgba(255,255,255,.45);border-top-color:#fff;
  animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.tf-auth-divider{display:flex;align-items:center;gap:12px;margin:24px 0 16px;color:var(--ink-3);font-size:12px;font-weight:600;}
.tf-auth-divider::before,.tf-auth-divider::after{content:'';flex:1;height:1px;background:var(--border-2);}
.tf-auth-demos{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.tf-auth-demo{display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:10px;background:var(--surface);
  border:1px solid var(--border);text-align:left;transition:.13s;}
.tf-auth-demo:hover{border-color:var(--primary);background:var(--surface-2);transform:translateY(-1px);box-shadow:var(--shadow-sm);}
.tf-auth-demo-info{display:flex;flex-direction:column;line-height:1.2;min-width:0;}
.tf-auth-demo-info b{font-size:13px;font-weight:700;}
.tf-auth-demo-info span{font-size:11px;color:var(--ink-3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tf-auth-fine{margin:16px 0 0;font-size:11.5px;color:var(--ink-3);line-height:1.5;}
.tf-auth-foot{position:absolute;bottom:26px;font-size:11.5px;color:var(--ink-3);font-weight:500;}

/* sent / magic-link email */
.tf-auth-sent{animation:pop .18s ease;}
.tf-auth-sent-ic{width:56px;height:56px;border-radius:16px;background:var(--primary-soft);color:var(--primary-deep);
  display:flex;align-items:center;justify-content:center;margin-bottom:18px;}
.tf-mail{margin-top:22px;border:1px solid var(--border-2);border-radius:14px;background:var(--surface);
  overflow:hidden;box-shadow:var(--shadow-md);}
.tf-mail-head{display:flex;align-items:center;gap:10px;padding:13px 15px;border-bottom:1px solid var(--border);background:var(--surface-2);}
.tf-logo.sm{width:26px;height:26px;border-radius:7px;}
.tf-mail-from{display:flex;flex-direction:column;line-height:1.25;flex:1;min-width:0;}
.tf-mail-from b{font-size:13px;font-weight:700;}
.tf-mail-from span{font-size:11px;color:var(--ink-3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tf-mail-time{font-size:11px;color:var(--ink-3);}
.tf-mail-body{padding:16px 15px 18px;}
.tf-mail-subject{margin:0;font-size:14.5px;font-weight:700;}
.tf-mail-line{margin:7px 0 16px;font-size:13px;color:var(--ink-2);line-height:1.5;}
.tf-mail-cta{height:44px;border-radius:10px;font-size:14px;}
.tf-mail-fine{margin:14px 0 0;font-size:11px;color:var(--ink-3);}
.tf-auth-text{display:inline-flex;align-items:center;gap:7px;margin-top:20px;font-size:13px;font-weight:600;
  color:var(--ink-2);transition:.13s;}
.tf-auth-text:hover{color:var(--primary);}

/* ---------- profile ---------- */
.tf-profile{width:440px;overflow:hidden;}
.tf-profile-cover{height:84px;background:linear-gradient(120deg,var(--primary),var(--primary-deep));position:relative;}
.tf-profile-close{position:absolute;top:12px;right:12px;color:#fff;background:rgba(255,255,255,.16);}
.tf-profile-close:hover{background:rgba(255,255,255,.28);color:#fff;}
.tf-profile-head{padding:0 24px 18px;margin-top:-40px;}
.tf-profile-av{width:80px;height:80px;border-radius:50%;border:3px solid var(--surface);background:var(--surface);
  display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow-sm);margin-bottom:12px;}
.tf-profile-name{display:flex;align-items:center;gap:10px;}
.tf-profile-name h2{font-size:21px;font-weight:800;letter-spacing:-.02em;}
.tf-role-badge{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:700;color:var(--review);
  background:var(--review-soft);padding:4px 9px;border-radius:99px;}
.tf-profile-title{margin:3px 0 0;font-size:13.5px;color:var(--ink-2);font-weight:600;}
.tf-profile-email{display:flex;align-items:center;gap:6px;margin:9px 0 0;font-size:12.5px;color:var(--ink-3);font-weight:500;}
.tf-profile-editbtn{margin-top:15px;}
.tf-profile-edit{display:flex;flex-direction:column;gap:9px;}
.tf-profile-edit input{background:var(--surface-2);border:1px solid var(--border-2);border-radius:9px;padding:10px 12px;
  outline:none;font-size:14px;transition:.13s;width:100%;}
.tf-profile-edit input:focus{border-color:var(--primary);background:var(--surface);box-shadow:0 0 0 3px var(--primary-soft);}
.tf-profile-edit-acts{display:flex;gap:8px;justify-content:flex-end;margin-top:2px;}
.tf-profile-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border);
  border-top:1px solid var(--border);border-bottom:1px solid var(--border);}
.tf-profile-stat{background:var(--surface);padding:15px 10px;text-align:center;display:flex;flex-direction:column;gap:3px;}
.tf-profile-stat b{font-size:23px;font-weight:800;letter-spacing:-.02em;}
.tf-profile-stat span{font-size:11.5px;color:var(--ink-3);font-weight:600;}
.tf-profile-body{padding:18px 24px 4px;max-height:240px;overflow-y:auto;}
.tf-profile-body h3{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-3);margin-bottom:11px;}
.tf-profile-empty{font-size:13px;color:var(--ink-3);line-height:1.5;}
.tf-profile-list{display:flex;flex-direction:column;gap:2px;}
.tf-profile-row{display:flex;align-items:center;gap:11px;padding:9px 8px;border-radius:10px;text-align:left;transition:.12s;width:100%;}
.tf-profile-row:hover{background:var(--surface-2);}
.tf-profile-row .tf-profile-row-ic{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex:none;}
.tf-profile-row-ic.completed{background:var(--done-soft);color:var(--done);}
.tf-profile-row-ic.claimed{background:var(--progress-soft);color:#9a6b18;}
.tf-profile-row-ic.created{background:var(--primary-soft);color:var(--primary-deep);}
.tf-profile-row-main{flex:1;display:flex;flex-direction:column;line-height:1.25;min-width:0;}
.tf-profile-row-main b{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tf-profile-row-main span{font-size:11.5px;color:var(--ink-3);}
.tf-profile-row svg{color:var(--ink-3);flex:none;}
.tf-profile-foot{padding:14px 24px;border-top:1px solid var(--border);background:var(--surface-2);}
.tf-logout{color:var(--overdue);}
.tf-logout:hover{background:var(--overdue-soft);color:var(--overdue);}

/* user menu additions */
.tf-usermenu-me{display:flex;align-items:center;gap:11px;padding:10px 11px 12px;}
.tf-usermenu-me-info{display:flex;flex-direction:column;line-height:1.3;min-width:0;}
.tf-usermenu-me-info b{font-size:13.5px;font-weight:700;}
.tf-usermenu-me-info span{font-size:11px;color:var(--ink-3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tf-usermenu-action{display:flex;align-items:center;gap:10px;width:100%;padding:9px 11px;border-radius:10px;
  font-size:13px;font-weight:600;color:var(--ink);text-align:left;transition:.12s;}
.tf-usermenu-action:hover{background:var(--surface-2);}
.tf-usermenu-action svg{color:var(--ink-2);}
.tf-usermenu-action.danger{color:var(--overdue);} .tf-usermenu-action.danger svg{color:var(--overdue);}
.tf-usermenu-action.danger:hover{background:var(--overdue-soft);}
.tf-usermenu-sep{height:1px;background:var(--border);margin:6px 4px;}

/* auth tabs / errors / mode badge / demo hint */
.tf-auth-tabs{display:flex;gap:3px;background:var(--surface-2);border:1px solid var(--border);border-radius:11px;
  padding:4px;margin-bottom:24px;}
.tf-auth-tabs button{flex:1;padding:9px 0;border-radius:8px;font-size:13.5px;font-weight:600;color:var(--ink-2);transition:.14s;}
.tf-auth-tabs button.on{background:var(--surface);color:var(--ink);box-shadow:var(--shadow-sm);}
.tf-auth-error{display:flex;align-items:center;gap:8px;margin-top:14px;padding:10px 13px;background:var(--overdue-soft);
  color:#a23528;border-radius:10px;font-size:12.5px;font-weight:600;line-height:1.4;}
.tf-auth-note{margin-top:14px;padding:10px 13px;background:var(--done-soft);color:#25794f;border-radius:10px;
  font-size:12.5px;font-weight:600;line-height:1.45;}
.tf-auth-switch{margin:16px 0 0;font-size:13px;color:var(--ink-2);text-align:center;}
.tf-auth-switch button{font-weight:700;color:var(--primary);}
.tf-auth-switch button:hover{text-decoration:underline;}
.tf-demo-hint{margin-top:22px;padding:12px 14px;background:var(--surface);border:1px dashed var(--border-2);
  border-radius:11px;font-size:12px;color:var(--ink-2);line-height:1.55;}
.tf-demo-hint b{color:var(--ink);} 
.tf-demo-hint code{background:var(--surface-2);border:1px solid var(--border);border-radius:5px;padding:1px 5px;
  font-size:11px;font-weight:600;color:var(--primary-deep);}
.tf-demo-hint button{display:inline-block;margin-top:4px;font-weight:700;color:var(--primary);}
.tf-demo-hint button:hover{text-decoration:underline;}
.tf-mode-badge{display:inline-flex;align-items:center;gap:7px;font-size:11.5px;font-weight:600;}
.tf-mode-badge .tf-mode-dot{width:7px;height:7px;border-radius:50%;}
.tf-mode-badge.live{color:#25794f;} .tf-mode-badge.live .tf-mode-dot{background:var(--done);box-shadow:0 0 0 3px var(--done-soft);}
.tf-mode-badge.demo{color:var(--ink-3);} .tf-mode-badge.demo .tf-mode-dot{background:var(--progress);box-shadow:0 0 0 3px var(--progress-soft);}
.tf-invite-tag{display:inline-flex;align-items:center;gap:7px;font-size:12.5px;font-weight:600;color:var(--primary-deep);
  background:var(--primary-soft);padding:6px 12px;border-radius:99px;margin-bottom:16px;}
.tf-invite-tag b{font-weight:800;}
.tf-spinner.dark{border-color:var(--border-2);border-top-color:var(--primary);}

/* splash */
.tf-splash{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;background:var(--bg);}
.tf-logo.lg{width:54px;height:54px;border-radius:15px;}

/* empty board */
.tf-empty-board{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;
  padding:40px;gap:6px;}
.tf-empty-ic{width:72px;height:72px;border-radius:20px;background:var(--surface);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;color:var(--primary);margin-bottom:12px;box-shadow:var(--shadow-sm);}
.tf-empty-board h2{font-size:21px;font-weight:800;letter-spacing:-.02em;}
.tf-empty-board p{margin:0 0 16px;color:var(--ink-2);font-size:14px;line-height:1.55;max-width:420px;}

/* invite modal */
.tf-invite-modal{width:480px;}
.tf-invite-body{padding:18px 22px 22px;}
.tf-invite-form{display:grid;grid-template-columns:1fr auto;gap:12px;align-items:end;}
.tf-invite-form .tf-field.full{grid-column:1 / -1;}
.tf-invite-form .tf-field>span{font-size:12px;font-weight:700;color:var(--ink-2);margin-bottom:6px;display:block;}
.tf-invite-form input{background:var(--surface-2);border:1px solid var(--border-2);border-radius:9px;padding:10px 12px;
  outline:none;width:100%;transition:.13s;}
.tf-invite-form input:focus{border-color:var(--primary);background:var(--surface);box-shadow:0 0 0 3px var(--primary-soft);}
.tf-role-opt{padding:9px 14px;border-radius:8px;font-size:12.5px;font-weight:600;color:var(--ink-2);
  background:var(--surface-2);border:1px solid var(--border-2);transition:.13s;}
.tf-role-opt.on{background:var(--primary);color:#fff;border-color:transparent;}
.tf-invite-send{grid-column:1 / -1;height:42px;}
.tf-invite-link{margin-top:16px;padding:14px;background:var(--primary-soft);border:1px solid #f0ddcd;border-radius:12px;}
.tf-invite-link-head{display:flex;align-items:center;gap:7px;font-size:12.5px;font-weight:600;color:var(--primary-deep);margin-bottom:10px;}
.tf-invite-link-row{display:flex;gap:8px;}
.tf-invite-link-row input{flex:1;background:var(--surface);border:1px solid var(--border-2);border-radius:8px;padding:8px 11px;
  font-size:12px;color:var(--ink-2);outline:none;}
.tf-invite-link-acts{display:flex;align-items:center;gap:12px;margin-top:10px;}
.tf-invite-fine{font-size:11.5px;color:var(--ink-2);}
.tf-invite-pending{margin-top:22px;}
.tf-invite-pending h3{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-3);margin-bottom:11px;}
.tf-invite-empty{font-size:13px;color:var(--ink-3);}
.tf-invite-row{display:flex;align-items:center;gap:11px;padding:9px 0;border-top:1px solid var(--border);}
.tf-invite-av{width:30px;height:30px;border-radius:9px;background:var(--surface-2);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;color:var(--ink-3);flex:none;}
.tf-invite-row-main{flex:1;display:flex;flex-direction:column;line-height:1.25;min-width:0;}
.tf-invite-row-main b{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tf-invite-row-main span{font-size:11px;color:var(--ink-3);}

/* ---------- team members ---------- */
.tf-team{padding:4px 24px 28px;}
.tf-team-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;margin-top:18px;}
.tf-member-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:18px;
  box-shadow:var(--shadow-sm);display:flex;flex-direction:column;gap:14px;position:relative;}
.tf-member-card.clickable{cursor:pointer;transition:.14s;}
.tf-member-card.clickable:hover{border-color:var(--primary);box-shadow:var(--shadow-md);transform:translateY(-2px);}
.tf-member-open{position:absolute;top:14px;right:14px;display:flex;align-items:center;gap:3px;color:var(--ink-3);
  font-size:11.5px;font-weight:700;transition:.13s;}
.tf-member-card.clickable:hover .tf-member-open{color:var(--primary);}
.tf-member-open-label{opacity:0;transition:.13s;}
.tf-member-card.clickable:hover .tf-member-open-label{opacity:1;}
.tf-member-top{display:flex;align-items:flex-start;gap:12px;}
.tf-member-id{flex:1;min-width:0;}
.tf-member-name{display:flex;align-items:center;gap:8px;font-size:15px;font-weight:700;letter-spacing:-.01em;}
.tf-you-tag{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--primary-deep);
  background:var(--primary-soft);padding:2px 6px;border-radius:5px;}
.tf-member-title{font-size:12.5px;color:var(--ink-2);margin-top:2px;}
.tf-role-badge.member{color:var(--ink-2);background:var(--surface-2);border:1px solid var(--border);}
.tf-member-email{display:flex;align-items:center;gap:7px;font-size:12.5px;color:var(--ink-3);font-weight:500;
  padding-bottom:13px;border-bottom:1px solid var(--border);}
.tf-member-email svg{flex:none;}
.tf-member-stats{display:flex;gap:22px;}
.tf-member-stats div{display:flex;flex-direction:column;}
.tf-member-stats b{font-size:19px;font-weight:800;letter-spacing:-.02em;}
.tf-member-stats span{font-size:11px;color:var(--ink-3);font-weight:600;margin-top:1px;}
.tf-member-acts{display:flex;gap:8px;border-top:1px solid var(--border);padding-top:13px;}
.tf-team-invite-cta{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-top:18px;
  padding:18px 22px;background:var(--primary-soft);border:1px solid #f0ddcd;border-radius:var(--r-lg);}
.tf-team-invite-cta b{display:block;font-size:14.5px;font-weight:700;color:var(--primary-deep);}
.tf-team-invite-cta span{display:block;font-size:12.5px;color:var(--ink-2);margin-top:3px;}
.tf-member-group{margin-bottom:18px;}
.tf-member-group h3{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-3);
  margin-bottom:9px;display:flex;align-items:center;gap:7px;}
.tf-member-tasks{display:flex;flex-direction:column;gap:5px;}
.tf-member-task{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;background:var(--surface-2);
  border:1px solid var(--border);text-align:left;transition:.13s;}
.tf-member-task:hover{border-color:var(--primary);background:var(--surface);box-shadow:var(--shadow-sm);}
.tf-member-task-main{flex:1;display:flex;flex-direction:column;gap:3px;min-width:0;}
.tf-member-task-main b{font-size:13.5px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tf-member-task-main span{font-size:11.5px;color:var(--ink-3);display:flex;align-items:center;gap:5px;}
.tf-member-task svg{color:var(--ink-3);flex:none;}

/* ---------- team chat ---------- */
.tf-chat{flex:1;display:flex;flex-direction:column;min-height:0;background:var(--bg);}
.tf-chat-head{display:flex;align-items:center;gap:13px;padding:18px 24px;border-bottom:1px solid var(--border);
  background:var(--surface);flex:none;}
.tf-chat-head-ic{width:40px;height:40px;border-radius:12px;background:var(--primary-soft);color:var(--primary-deep);
  display:flex;align-items:center;justify-content:center;flex:none;}
.tf-chat-head h2{font-size:16px;font-weight:700;letter-spacing:-.01em;}
.tf-chat-head p{font-size:12.5px;color:var(--ink-3);margin-top:2px;}
.tf-chat-scroll{flex:1;overflow-y:auto;padding:20px 24px 8px;display:flex;flex-direction:column;gap:3px;}
.tf-chat-loading{flex:1;display:flex;align-items:center;justify-content:center;}
.tf-chat-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;text-align:center;color:var(--ink-3);}
.tf-chat-empty-ic{width:60px;height:60px;border-radius:18px;background:var(--surface);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;color:var(--primary);margin-bottom:8px;}
.tf-chat-empty b{font-size:15px;font-weight:700;color:var(--ink);}
.tf-chat-empty span{font-size:13px;max-width:300px;}
.tf-chat-day{display:flex;align-items:center;justify-content:center;margin:14px 0 10px;}
.tf-chat-day span{font-size:11px;font-weight:700;color:var(--ink-3);background:var(--surface-2);
  border:1px solid var(--border);padding:3px 12px;border-radius:99px;}
.tf-msg{display:flex;gap:10px;padding:1px 0;align-items:flex-end;}
.tf-msg.grouped{margin-top:-1px;}
.tf-msg-av{width:32px;flex:none;}
.tf-msg-main{display:flex;flex-direction:column;max-width:min(640px,72%);}
.tf-msg-meta{display:flex;align-items:baseline;gap:8px;margin:8px 0 4px 2px;}
.tf-msg-meta b{font-size:12.5px;font-weight:700;}
.tf-msg-meta span{font-size:10.5px;color:var(--ink-3);}
.tf-msg-bubble{background:var(--surface);border:1px solid var(--border);padding:9px 13px;border-radius:14px;
  border-top-left-radius:5px;font-size:13.5px;line-height:1.45;color:var(--ink);box-shadow:var(--shadow-sm);
  white-space:pre-wrap;word-break:break-word;}
.tf-msg.grouped .tf-msg-bubble{border-top-left-radius:14px;}
/* own messages */
.tf-msg.mine{flex-direction:row-reverse;}
.tf-msg.mine .tf-msg-main{align-items:flex-end;}
.tf-msg.mine .tf-msg-meta{margin-right:2px;margin-left:0;flex-direction:row-reverse;}
.tf-msg.mine .tf-msg-bubble{background:var(--primary);color:#fff;border-color:transparent;
  border-radius:14px;border-top-right-radius:5px;}
.tf-msg.mine.grouped .tf-msg-bubble{border-top-right-radius:14px;}
.tf-msg-bubble.pending{opacity:.6;}
.tf-chat-compose{flex:none;display:flex;gap:10px;padding:14px 24px;border-top:1px solid var(--border);background:var(--surface);}
.tf-chat-compose input{flex:1;background:var(--surface-2);border:1px solid var(--border-2);border-radius:11px;
  padding:0 16px;height:46px;outline:none;font-size:14px;transition:.14s;}
.tf-chat-compose input:focus{border-color:var(--primary);background:var(--surface);box-shadow:0 0 0 3px var(--primary-soft);}
.tf-chat-send{width:46px;height:46px;border-radius:11px;background:var(--primary);color:#fff;display:flex;
  align-items:center;justify-content:center;flex:none;transition:.14s;box-shadow:var(--shadow-sm);}
.tf-chat-send:hover:not(:disabled){filter:brightness(1.05);}
.tf-chat-send:disabled{opacity:.4;cursor:not-allowed;}

/* ---------- edit / delete on task sheet ---------- */
.tf-sheet-head-acts{display:flex;gap:4px;margin-left:auto;}
.tf-fact-who{display:inline-flex;align-items:center;gap:6px;}
.tf-field-opt{font-style:normal;font-weight:500;color:var(--ink-3);font-size:11px;}
.tf-repeat{display:inline-flex;align-items:center;gap:4px;font-size:11.5px;font-weight:600;color:var(--review);}
.tf-mgr-bar{display:flex;justify-content:flex-end;padding:0 24px 4px;margin-top:-8px;}
.tf-analytics h2,.tf-panel-wide h2{display:flex;align-items:center;gap:8px;}
.tf-analytics-row{display:flex;align-items:center;gap:28px;}
.tf-donut-wrap{flex:none;}
.tf-donut{width:104px;height:104px;border-radius:50%;display:flex;align-items:center;justify-content:center;}
.tf-donut-hole{width:74px;height:74px;border-radius:50%;background:var(--surface);display:flex;flex-direction:column;
  align-items:center;justify-content:center;box-shadow:inset 0 0 0 1px var(--border);}
.tf-donut-hole b{font-size:22px;font-weight:800;letter-spacing:-.02em;}
.tf-donut-hole span{font-size:11px;color:var(--ink-3);font-weight:600;}
.tf-dist{flex:1;display:flex;flex-direction:column;gap:9px;}
.tf-dist-row{display:flex;align-items:center;gap:11px;}
.tf-dist-label{width:92px;font-size:12.5px;color:var(--ink-2);font-weight:600;flex:none;}
.tf-dist-track{flex:1;height:9px;border-radius:99px;background:var(--surface-2);overflow:hidden;}
.tf-dist-fill{height:100%;border-radius:99px;min-width:2px;transition:width .4s;}
.tf-dist-fill.open{background:var(--open,#5B8DEF);} .tf-dist-fill.progress{background:var(--progress);}
.tf-dist-fill.review{background:var(--review);} .tf-dist-fill.done{background:var(--done);}
.tf-dist-n{width:24px;text-align:right;font-size:13px;font-weight:700;flex:none;}
.tf-bars{display:flex;flex-direction:column;gap:11px;}
.tf-bar-row{display:flex;align-items:center;gap:11px;}
.tf-bar-who{width:108px;display:flex;align-items:center;gap:8px;flex:none;}
.tf-bar-who span{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tf-bar-track{flex:1;height:11px;border-radius:99px;background:var(--surface-2);overflow:hidden;}
.tf-bar-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--primary),var(--primary-deep));min-width:3px;transition:width .4s;}
.tf-bar-n{width:22px;text-align:right;font-size:13px;font-weight:700;flex:none;}
.tf-del-confirm{display:flex;align-items:center;justify-content:space-between;gap:14px;
  padding:13px 20px;background:var(--overdue-soft);border-bottom:1px solid #f1cfc9;flex:none;}
.tf-del-confirm-text b{display:block;font-size:13.5px;font-weight:700;color:#a23528;}
.tf-del-confirm-text span{display:block;font-size:12px;color:#a8584e;margin-top:1px;}

@media (max-width:1180px){
  .tf-board{grid-template-columns:repeat(2,1fr);overflow-y:auto;}
  .tf-col{min-height:280px;}
  .tf-mgr-grid{grid-template-columns:1fr;}
  .tf-mgr-stats{grid-template-columns:repeat(3,1fr);}
  .tf-auth{grid-template-columns:1fr;}
  .tf-auth-art{display:none;}
}
</style>
</head>
